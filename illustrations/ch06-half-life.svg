<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" style="font-family: 'Noto Serif CJK SC', serif; background: #fefefe;">
  <title>最佳实践的半衰期</title>

  <rect width="800" height="420" fill="white"/>

  <!-- 标题 -->
  <text x="400" y="40" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">最佳实践的半衰期</text>
  <text x="400" y="65" text-anchor="middle" font-size="10" fill="#777">从发现到被取代的时间，正在急剧缩短</text>

  <!-- ============================================================ -->
  <!-- 四个柱状图 -->
  <!-- ============================================================ -->

  <!-- 泰勒科学管理 - 100年 (最高) -->
  <rect x="80" y="180" width="140" height="180" rx="6" fill="#e7f5ff" stroke="#1864ab" stroke-width="2"/>
  <text x="150" y="210" text-anchor="middle" font-size="11" font-weight="bold" fill="#1864ab">泰勒</text>
  <text x="150" y="230" text-anchor="middle" font-size="9" fill="#666">科学管理原理</text>
  <text x="150" y="320" text-anchor="middle" font-size="28" font-weight="bold" fill="#1864ab">100</text>
  <text x="150" y="345" text-anchor="middle" font-size="11" fill="#1864ab">年</text>

  <!-- 平衡计分卡 - 20年 -->
  <rect x="250" y="280" width="140" height="80" rx="6" fill="#ebfbee" stroke="#2b8a3e" stroke-width="2"/>
  <text x="320" y="300" text-anchor="middle" font-size="11" font-weight="bold" fill="#2b8a3e">平衡计分卡</text>
  <text x="320" y="320" text-anchor="middle" font-size="9" fill="#666">1992年提出</text>
  <text x="320" y="350" text-anchor="middle" font-size="28" font-weight="bold" fill="#2b8a3e">20</text>
  <text x="320" y="375" text-anchor="middle" font-size="11" fill="#2b8a3e">年</text>

  <!-- 敏捷开发 - 15年 -->
  <rect x="420" y="310" width="140" height="50" rx="6" fill="#f3f0ff" stroke="#862e9c" stroke-width="2"/>
  <text x="490" y="330" text-anchor="middle" font-size="11" font-weight="bold" fill="#862e9c">敏捷开发</text>
  <text x="490" y="350" text-anchor="middle" font-size="9" fill="#666">2001年宣言</text>
  <text x="490" y="380" text-anchor="middle" font-size="18" font-weight="bold" fill="#862e9c">15</text>
  <text x="490" y="400" text-anchor="middle" font-size="10" fill="#862e9c">年</text>

  <!-- AI最佳实践 - ? (最短) -->
  <rect x="590" y="350" width="140" height="10" rx="3" fill="#fff5f7" stroke="#e64980" stroke-width="2"/>
  <text x="660" y="335" text-anchor="middle" font-size="11" font-weight="bold" fill="#e64980">AI最佳实践</text>
  <text x="660" y="355" text-anchor="middle" font-size="9" fill="#666">GPT-4: 2023.3</text>
  <text x="660" y="395" text-anchor="middle" font-size="18" font-weight="bold" fill="#e64980">?</text>

  <!-- 递减箭头 -->
  <path d="M150 160 Q250 140 320 240" fill="none" stroke="#868e96" stroke-width="1.5" stroke-dasharray="5,4"/>
  <path d="M320 240 Q420 270 490 280" fill="none" stroke="#868e96" stroke-width="1.5" stroke-dasharray="5,4"/>
  <path d="M490 280 Q540 310 660 320" fill="none" stroke="#868e96" stroke-width="1.5" stroke-dasharray="5,4"/>

  <!-- ============================================================ -->
  <!-- 底部结论 -->
  <!-- ============================================================ -->

  <line x1="50" y1="410" x2="750" y2="410" stroke="#e0e0e0" stroke-width="1"/>

  <rect x="120" y="85" width="560" height="45" rx="8" fill="#fff5f5" stroke="#e64980" stroke-width="2"/>
  <text x="400" y="105" text-anchor="middle" font-size="11" fill="#333">当所有人都能快速复制最佳实践时</text>
  <text x="400" y="122" text-anchor="middle" font-size="11" font-weight="bold" fill="#e64980">最佳实践就不再是竞争优势的来源</text>

</svg>