<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" style="font-family: 'Noto Serif CJK SC', serif; background: #fefefe;">
  <title>群体变革阻力</title>

  <rect width="800" height="420" fill="white"/>

  <!-- 标题 -->
  <text x="400" y="40" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">最强大的变革阻力来自群体</text>
  <text x="400" y="62" text-anchor="middle" font-size="10" fill="#777">个体阻力可以替换，群体阻力需要转化</text>

  <!-- ============================================================ -->
  <!-- 左侧：个体阻力 -->
  <!-- ============================================================ -->

  <rect x="50" y="90" width="300" height="200" rx="10" fill="#e7f5ff" stroke="#1864ab" stroke-width="2"/>
  <text x="200" y="120" text-anchor="middle" font-size="13" font-weight="bold" fill="#1864ab">个体阻力</text>

  <!-- 一个人图标 -->
  <circle cx="120" cy="180" r="25" fill="#1864ab"/>
  <text x="120" y="186" text-anchor="middle" font-size="14" fill="white">👤</text>

  <text x="160" y="175" font-size="10" fill="#333">可识别</text>
  <text x="160" y="195" font-size="10" fill="#333">可替换</text>
  <text x="160" y="215" font-size="10" fill="#333">可说服</text>

  <text x="200" y="260" text-anchor="middle" font-size="10" fill="#2b8a3e">✓ 可以解决</text>

  <!-- ============================================================ -->
  <!-- 中间 VS -->
  <!-- ============================================================ -->

  <text x="400" y="180" text-anchor="middle" font-size="30" fill="#c92a2a">VS</text>

  <!-- ============================================================ -->
  <!-- 右侧：群体阻力 -->
  <!-- ============================================================ -->

  <rect x="450" y="90" width="300" height="200" rx="10" fill="#fff5f7" stroke="#e64980" stroke-width="2"/>
  <text x="600" y="120" text-anchor="middle" font-size="13" font-weight="bold" fill="#e64980">群体阻力</text>

  <!-- 多个人图标 -->
  <circle cx="520" cy="170" r="20" fill="#e64980"/>
  <circle cx="560" cy="180" r="20" fill="#e64980"/>
  <circle cx="600" cy="170" r="20" fill="#e64980"/>
  <circle cx="640" cy="180" r="20" fill="#e64980"/>
  <circle cx="680" cy="170" r="20" fill="#e64980"/>

  <text x="550" y="220" font-size="10" fill="#333">规范压力 - 成为异类的代价</text>
  <text x="550" y="245" font-size="10" fill="#333">利益联盟 - 共同利益的保护</text>
  <text x="550" y="270" font-size="10" fill="#333">信息控制 - 群体的话语权</text>

  <text x="600" y="260" text-anchor="middle" font-size="10" fill="#c92a2a">✗ 需要转化，不能强攻</text>

  <!-- ============================================================ -->
  <!-- 底部：为什么群体阻力更强大 -->
  <!-- ============================================================ -->

  <line x1="50" y1="320" x2="750" y2="320" stroke="#e0e0e0" stroke-width="1"/>

  <rect x="100" y="335" width="600" height="80" rx="10" fill="#fff9db" stroke="#d77a00" stroke-width="2"/>
  <text x="400" y="360" text-anchor="middle" font-size="11" font-weight="bold" fill="#d77a00">为什么群体阻力更强大？</text>
  <text x="400" y="385" text-anchor="middle" font-size="10" fill="#333">1. 规范压力：当群体大多数人反对变革时，个体很难独自支持</text>
  <text x="400" y="405" text-anchor="middle" font-size="10" fill="#333">2. 利益联盟：群体形成共同利益保护，个体替换无法解决问题</text>

</svg>