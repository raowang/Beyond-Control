<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" style="font-family: 'Noto Serif CJK SC', serif; background: #fefefe;">
  <title>旧逻辑失灵的五个信号</title>

  <!-- 背景 -->
  <rect width="800" height="500" fill="white"/>

  <!-- ============================================================ -->
  <!-- 中央：旧逻辑失灵 -->
  <!-- ============================================================ -->

  <!-- 中央大圆 - 旧逻辑 -->
  <circle cx="400" cy="240" r="70" fill="#fff5f5" stroke="#c92a2a" stroke-width="3"/>
  <text x="400" y="232" text-anchor="middle" font-size="16" font-weight="bold" fill="#c92a2a">旧逻辑</text>
  <text x="400" y="252" text-anchor="middle" font-size="16" font-weight="bold" fill="#c92a2a">失灵</text>

  <!-- 闪电裂痕 -->
  <path d="M400 170 L410 195 L395 195 L405 220" fill="none" stroke="#c92a2a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M385 180 L375 200 L390 200 L380 220" fill="none" stroke="#c92a2a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ============================================================ -->
  <!-- 五个信号 -->
  <!-- ============================================================ -->

  <!-- 信号1：战略规划赶不上变化 (左上) -->
  <rect x="60" y="80" width="200" height="100" rx="8" fill="#e7f5ff" stroke="#1864ab" stroke-width="2"/>
  <text x="160" y="108" text-anchor="middle" font-size="14" font-weight="bold" fill="#1864ab">信号一</text>
  <text x="160" y="132" text-anchor="middle" font-size="12" fill="#333">战略规划</text>
  <text x="160" y="152" text-anchor="middle" font-size="12" fill="#333">赶不上变化</text>
  <!-- 连接线 -->
  <path d="M200 180 Q280 180 340 200" fill="none" stroke="#868e96" stroke-width="1.5" stroke-dasharray="5,4"/>
  <polygon points="340,200 335,196 337,204" fill="#868e96"/>

  <!-- 信号2：最佳实践变成最佳诅咒 (右上) -->
  <rect x="540" y="80" width="200" height="100" rx="8" fill="#f3f0ff" stroke="#862e9c" stroke-width="2"/>
  <text x="640" y="108" text-anchor="middle" font-size="14" font-weight="bold" fill="#862e9c">信号二</text>
  <text x="640" y="132" text-anchor="middle" font-size="12" fill="#333">最佳实践</text>
  <text x="640" y="152" text-anchor="middle" font-size="12" fill="#333">变成最佳诅咒</text>
  <!-- 连接线 -->
  <path d="M600 180 Q520 180 460 200" fill="none" stroke="#868e96" stroke-width="1.5" stroke-dasharray="5,4"/>
  <polygon points="460,200 465,196 463,204" fill="#868e96"/>

  <!-- 信号3：绩效考核越来越难 (左中) -->
  <rect x="60" y="280" width="200" height="100" rx="8" fill="#fff5f7" stroke="#e64980" stroke-width="2"/>
  <text x="160" y="308" text-anchor="middle" font-size="14" font-weight="bold" fill="#e64980">信号三</text>
  <text x="160" y="332" text-anchor="middle" font-size="12" fill="#333">绩效考核</text>
  <text x="160" y="352" text-anchor="middle" font-size="12" fill="#333">越来越难反映真实贡献</text>
  <!-- 连接线 -->
  <path d="M200 300 Q280 300 340 270" fill="none" stroke="#868e96" stroke-width="1.5" stroke-dasharray="5,4"/>
  <polygon points="340,270 335,274 343,274" fill="#868e96"/>

  <!-- 信号4：组织边界模糊 (右中) -->
  <rect x="540" y="280" width="200" height="100" rx="8" fill="#fff9db" stroke="#d77a00" stroke-width="2"/>
  <text x="640" y="308" text-anchor="middle" font-size="14" font-weight="bold" fill="#d77a00">信号四</text>
  <text x="640" y="332" text-anchor="middle" font-size="12" fill="#333">组织边界模糊</text>
  <text x="640" y="352" text-anchor="middle" font-size="12" fill="#333">内部摩擦却越来越大</text>
  <!-- 连接线 -->
  <path d="M600 300 Q520 300 460 270" fill="none" stroke="#868e96" stroke-width="1.5" stroke-dasharray="5,4"/>
  <polygon points="460,270 465,274 463,266" fill="#868e96"/>

  <!-- 信号5：人才培养跟不上 (底部中间) -->
  <rect x="280" y="400" width="240" height="90" rx="8" fill="#ebfbee" stroke="#2b8a3e" stroke-width="2"/>
  <text x="400" y="428" text-anchor="middle" font-size="14" font-weight="bold" fill="#2b8a3e">信号五</text>
  <text x="400" y="452" text-anchor="middle" font-size="12" fill="#333">人才培养速度</text>
  <text x="400" y="472" text-anchor="middle" font-size="12" fill="#333">跟不上能力折旧速度</text>
  <!-- 连接线 -->
  <path d="M400 310 Q400 360 400 395" fill="none" stroke="#868e96" stroke-width="1.5" stroke-dasharray="5,4"/>
  <polygon points="400,395 396,389 404,389" fill="#868e96"/>

  <!-- ============================================================ -->
  <!-- 底部总结 -->
  <!-- ============================================================ -->
  <line x1="50" y1="20" x2="750" y2="20" stroke="#e0e0e0" stroke-width="1"/>

  <text x="400" y="48" text-anchor="middle" font-size="15" font-weight="bold" fill="#333">五个信号背后的共同逻辑</text>

  <rect x="150" y="58" width="500" height="36" rx="6" fill="#f8f9fa" stroke="#ddd" stroke-width="1"/>
  <text x="400" y="82" text-anchor="middle" font-size="13" fill="#666">
    工业时代和知识经济时代的管理逻辑建立在
    <tspan fill="#c92a2a" font-weight="bold">"环境稳定"</tspan>
    假设之上
  </text>

</svg>