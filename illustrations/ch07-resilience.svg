<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" style="font-family: 'Noto Serif CJK SC', serif; background: #fefefe;">
  <title>韧性的三层含义</title>

  <rect width="800" height="450" fill="white"/>

  <!-- 标题 -->
  <text x="400" y="40" text-anchor="middle" font-size="10" font-weight="bold" fill="#333">组织能力的三层</text>
  <text x="400" y="62" text-anchor="middle" font-size="6" fill="#777">效率 → 优化 → 韧性，AI时代优先级正在反转</text>

  <!-- ============================================================ -->
  <!-- 三层金字塔 -->
  <!-- ============================================================ -->

  <!-- 底层：效率 (最宽) -->
  <path d="M100 400 L400 180 L700 400 Z" fill="#e7f5ff" stroke="#1864ab" stroke-width="2"/>
  <text x="400" y="340" text-anchor="middle" font-size="9" font-weight="bold" fill="#1864ab">效率</text>
  <text x="400" y="365" text-anchor="middle" font-size="6" fill="#666">做事的速度和质量</text>

  <!-- 中层：优化 -->
  <path d="M200 340 L400 180 L600 340 Z" fill="#f3f0ff" stroke="#862e9c" stroke-width="2"/>
  <text x="400" y="280" text-anchor="middle" font-size="9" font-weight="bold" fill="#862e9c">优化</text>
  <text x="400" y="305" text-anchor="middle" font-size="6" fill="#666">在给定条件下找最优解</text>

  <!-- 顶层：韧性 (最小) -->
  <path d="M300 280 L400 180 L500 280 Z" fill="#fff5f5" stroke="#c92a2a" stroke-width="3"/>
  <text x="400" y="235" text-anchor="middle" font-size="8" font-weight="bold" fill="#c92a2a">韧性</text>

  <!-- ============================================================ -->
  <!-- 右侧：定义说明 -->
  <!-- ============================================================ -->

  <!-- 韧性定义 -->
  <rect x="520" y="100" width="250" height="80" rx="8" fill="#fff5f5" stroke="#c92a2a" stroke-width="2"/>
  <text x="645" y="125" text-anchor="middle" font-size="7" font-weight="bold" fill="#c92a2a">什么是韧性？</text>
  <text x="645" y="150" text-anchor="middle" font-size="6" fill="#333">部分失效时</text>
  <text x="645" y="170" text-anchor="middle" font-size="6" fill="#333">继续维持核心功能</text>

  <!-- ============================================================ -->
  <!-- 底部：AI时代洞察 -->
  <!-- ============================================================ -->

  <line x1="50" y1="420" x2="750" y2="420" stroke="#e0e0e0" stroke-width="1"/>

  <rect x="100" y="85" width="380" height="80" rx="8" fill="#ebfbee" stroke="#2b8a3e" stroke-width="2"/>
  <text x="290" y="110" text-anchor="middle" font-size="7" font-weight="bold" fill="#2b8a3e">AI时代新现实</text>
  <text x="290" y="135" text-anchor="middle" font-size="6" fill="#333">当AI成为核心基础设施</text>
  <text x="290" y="155" text-anchor="middle" font-size="6" fill="#333">失效的影响范围和深度</text>
  <text x="290" y="175" text-anchor="middle" font-size="6" fill="#c92a2a">远超过去</text>

  <!-- 优先级箭头 -->
  <path d="M720 380 L720 200" fill="none" stroke="#e64980" stroke-width="3" stroke-linecap="round"/>
  <polygon points="720,200 715,215 725,215" fill="#e64980"/>
  <text x="750" y="300" font-size="7" font-weight="bold" fill="#e64980">优先级</text>
  <text x="750" y="320" font-size="7" font-weight="bold" fill="#e64980">上升</text>

</svg>