<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" style="font-family: 'Noto Serif CJK SC', serif; background: #fefefe;">
  <title>组织的两张图</title>

  <rect width="800" height="420" fill="white"/>

  <!-- 标题 -->
  <text x="400" y="40" text-anchor="middle" font-size="20" font-weight="bold" fill="#333">组织的两张图</text>

  <!-- ============================================================ -->
  <!-- 左侧：组织架构图 -->
  <!-- ============================================================ -->

  <rect x="40" y="65" width="320" height="280" rx="10" fill="#f8f9fa" stroke="#868e96" stroke-width="2"/>
  <text x="200" y="95" text-anchor="middle" font-size="16" font-weight="bold" fill="#666">组织架构图</text>

  <!-- 层级结构 -->
  <!-- CEO -->
  <rect x="150" y="120" width="100" height="40" rx="6" fill="#e9ecef" stroke="#495057" stroke-width="2"/>
  <text x="200" y="145" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">CEO</text>

  <!-- 连接线 -->
  <line x1="200" y1="160" x2="200" y2="185" stroke="#868e96" stroke-width="1.5"/>
  <line x1="120" y1="185" x2="280" y2="185" stroke="#868e96" stroke-width="1.5"/>
  <line x1="120" y1="185" x2="120" y2="200" stroke="#868e96" stroke-width="1.5"/>
  <line x1="200" y1="185" x2="200" y2="200" stroke="#868e96" stroke-width="1.5"/>
  <line x1="280" y1="185" x2="280" y2="200" stroke="#868e96" stroke-width="1.5"/>

  <!-- C级高管 -->
  <rect x="70" y="200" width="100" height="35" rx="5" fill="#e9ecef" stroke="#495057" stroke-width="1.5"/>
  <text x="120" y="223" text-anchor="middle" font-size="11" fill="#333">CFO</text>

  <rect x="150" y="200" width="100" height="35" rx="5" fill="#e9ecef" stroke="#495057" stroke-width="1.5"/>
  <text x="200" y="223" text-anchor="middle" font-size="11" fill="#333">CTO</text>

  <rect x="230" y="200" width="100" height="35" rx="5" fill="#e9ecef" stroke="#495057" stroke-width="1.5"/>
  <text x="280" y="223" text-anchor="middle" font-size="11" fill="#333">COO</text>

  <!-- 说明 -->
  <line x1="40" y1="270" x2="360" y2="270" stroke="#e0e0e0" stroke-width="1"/>
  <text x="200" y="295" text-anchor="middle" font-size="12" fill="#666">告诉你的：</text>
  <text x="200" y="315" text-anchor="middle" font-size="13" font-weight="bold" fill="#868e96">谁向谁汇报</text>
  <text x="200" y="335" text-anchor="middle" font-size="11" fill="#999">(但实际运作未必如此)</text>

  <!-- 划掉 -->
  <line x1="60" y1="90" x2="340" y2="330" stroke="#c92a2a" stroke-width="3" opacity="0.5"/>

  <!-- ============================================================ -->
  <!-- 中间箭头 -->
  <!-- ============================================================ -->

  <text x="400" y="200" text-anchor="middle" font-size="40" fill="#c92a2a" opacity="0.6">≠</text>

  <!-- ============================================================ -->
  <!-- 右侧：决策权分配体系 -->
  <!-- ============================================================ -->

  <rect x="440" y="65" width="320" height="280" rx="10" fill="#ebfbee" stroke="#2b8a3e" stroke-width="2"/>
  <text x="600" y="95" text-anchor="middle" font-size="16" font-weight="bold" fill="#2b8a3e">决策权分配体系</text>

  <!-- 决策节点 -->
  <!-- 资源分配 -->
  <ellipse cx="500" cy="150" rx="70" ry="30" fill="#fff" stroke="#2b8a3e" stroke-width="1.5"/>
  <text x="500" y="145" text-anchor="middle" font-size="12" font-weight="bold" fill="#2b8a3e">资源分配</text>
  <text x="500" y="165" text-anchor="middle" font-size="10" fill="#666">谁决定资源流向？</text>

  <!-- 优先级排序 -->
  <ellipse cx="700" cy="150" rx="70" ry="30" fill="#fff" stroke="#2b8a3e" stroke-width="1.5"/>
  <text x="700" y="145" text-anchor="middle" font-size="12" font-weight="bold" fill="#2b8a3e">优先级排序</text>
  <text x="700" y="165" text-anchor="middle" font-size="10" fill="#666">谁决定先做什么？</text>

  <!-- 问题解决 -->
  <ellipse cx="500" cy="230" rx="70" ry="30" fill="#fff" stroke="#2b8a3e" stroke-width="1.5"/>
  <text x="500" y="225" text-anchor="middle" font-size="12" font-weight="bold" fill="#2b8a3e">问题解决</text>
  <text x="500" y="245" text-anchor="middle" font-size="10" fill="#666">谁决定怎么做？</text>

  <!-- 风险承担 -->
  <ellipse cx="700" cy="230" rx="70" ry="30" fill="#fff" stroke="#2b8a3e" stroke-width="1.5"/>
  <text x="700" y="225" text-anchor="middle" font-size="12" font-weight="bold" fill="#2b8a3e">风险承担</text>
  <text x="700" y="245" text-anchor="middle" font-size="10" fill="#666">谁为结果负责？</text>

  <!-- 连接线 -->
  <line x1="570" y1="150" x2="630" y2="150" stroke="#2b8a3e" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="500" y1="180" x2="500" y2="200" stroke="#2b8a3e" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="700" y1="180" x2="700" y2="200" stroke="#2b8a3e" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="500" y1="230" x2="630" y2="230" stroke="#2b8a3e" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- 说明 -->
  <line x1="440" y1="270" x2="760" y2="270" stroke="#e0e0e0" stroke-width="1"/>
  <text x="600" y="295" text-anchor="middle" font-size="12" fill="#666">真实的：</text>
  <text x="600" y="315" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b8a3e">谁做什么决定</text>

  <!-- ============================================================ -->
  <!-- 底部引言 -->
  <!-- ============================================================ -->

  <line x1="40" y1="370" x2="760" y2="370" stroke="#e0e0e0" stroke-width="1"/>

  <rect x="180" y="380" width="440" height="35" rx="6" fill="#fff5f5" stroke="#c92a2a" stroke-width="2"/>
  <text x="400" y="403" text-anchor="middle" font-size="13" fill="#333">组织结构不是组织图，而是</text>
  <text x="400" y="418" text-anchor="middle" font-size="14" font-weight="bold" fill="#c92a2a">决策权分配体系 —— 德鲁克</text>

</svg>