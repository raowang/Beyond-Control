<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" style="font-family: 'Noto Serif CJK SC', serif; background: #fefefe;">
  <title>组织的两张图</title>

  <rect width="800" height="440" fill="white"/>

  <!-- 标题 -->
  <text x="400" y="35" text-anchor="middle" font-size="5" font-weight="bold" fill="#333">组织的两张图</text>

  <!-- ============================================================ -->
  <!-- 左侧：组织架构图 -->
  <!-- ============================================================ -->

  <rect x="40" y="55" width="320" height="260" rx="10" fill="#f8f9fa" stroke="#868e96" stroke-width="2"/>
  <text x="200" y="82" text-anchor="middle" font-size="4" font-weight="bold" fill="#666">组织架构图</text>

  <!-- 层级结构 -->
  <rect x="150" y="105" width="100" height="38" rx="6" fill="#e9ecef" stroke="#495057" stroke-width="2"/>
  <text x="200" y="128" text-anchor="middle" font-size="3" font-weight="bold" fill="#333">CEO</text>

  <line x1="200" y1="143" x2="200" y2="165" stroke="#868e96" stroke-width="1.5"/>
  <line x1="120" y1="165" x2="280" y2="165" stroke="#868e96" stroke-width="1.5"/>
  <line x1="120" y1="165" x2="120" y2="180" stroke="#868e96" stroke-width="1.5"/>
  <line x1="200" y1="165" x2="200" y2="180" stroke="#868e96" stroke-width="1.5"/>
  <line x1="280" y1="165" x2="280" y2="180" stroke="#868e96" stroke-width="1.5"/>

  <rect x="70" y="180" width="100" height="32" rx="5" fill="#e9ecef" stroke="#495057" stroke-width="1.5"/>
  <text x="120" y="201" text-anchor="middle" font-size="3" fill="#333">CFO</text>

  <rect x="150" y="180" width="100" height="32" rx="5" fill="#e9ecef" stroke="#495057" stroke-width="1.5"/>
  <text x="200" y="201" text-anchor="middle" font-size="3" fill="#333">CTO</text>

  <rect x="230" y="180" width="100" height="32" rx="5" fill="#e9ecef" stroke="#495057" stroke-width="1.5"/>
  <text x="280" y="201" text-anchor="middle" font-size="3" fill="#333">COO</text>

  <!-- 说明 -->
  <line x1="40" y1="245" x2="360" y2="245" stroke="#e0e0e0" stroke-width="1"/>
  <text x="200" y="268" text-anchor="middle" font-size="3" fill="#666">告诉你的：</text>
  <text x="200" y="288" text-anchor="middle" font-size="3" font-weight="bold" fill="#868e96">谁向谁汇报</text>
  <text x="200" y="305" text-anchor="middle" font-size="3" fill="#999">(但实际运作未必如此)</text>

  <!-- 划掉 -->
  <line x1="60" y="78" x2="340" y2="305" stroke="#c92a2a" stroke-width="3" opacity="0.5"/>

  <!-- ============================================================ -->
  <!-- 中间箭头 -->
  <!-- ============================================================ -->

  <text x="400" y="180" text-anchor="middle" font-size="35" fill="#c92a2a" opacity="0.6">≠</text>

  <!-- ============================================================ -->
  <!-- 右侧：决策权分配体系 -->
  <!-- ============================================================ -->

  <rect x="440" y="55" width="320" height="260" rx="10" fill="#ebfbee" stroke="#2b8a3e" stroke-width="2"/>
  <text x="600" y="82" text-anchor="middle" font-size="4" font-weight="bold" fill="#2b8a3e">决策权分配体系</text>

  <!-- 决策节点 -->
  <ellipse cx="500" cy="135" rx="68" ry="28" fill="#fff" stroke="#2b8a3e" stroke-width="1.5"/>
  <text x="500" y="130" text-anchor="middle" font-size="3" font-weight="bold" fill="#2b8a3e">资源分配</text>
  <text x="500" y="148" text-anchor="middle" font-size="3" fill="#666">谁决定资源流向？</text>

  <ellipse cx="700" cy="135" rx="68" ry="28" fill="#fff" stroke="#2b8a3e" stroke-width="1.5"/>
  <text x="700" y="130" text-anchor="middle" font-size="3" font-weight="bold" fill="#2b8a3e">优先级排序</text>
  <text x="700" y="148" text-anchor="middle" font-size="3" fill="#666">谁决定先做什么？</text>

  <ellipse cx="500" cy="210" rx="68" ry="28" fill="#fff" stroke="#2b8a3e" stroke-width="1.5"/>
  <text x="500" y="205" text-anchor="middle" font-size="3" font-weight="bold" fill="#2b8a3e">问题解决</text>
  <text x="500" y="223" text-anchor="middle" font-size="3" fill="#666">谁决定怎么做？</text>

  <ellipse cx="700" cy="210" rx="68" ry="28" fill="#fff" stroke="#2b8a3e" stroke-width="1.5"/>
  <text x="700" y="205" text-anchor="middle" font-size="3" font-weight="bold" fill="#2b8a3e">风险承担</text>
  <text x="700" y="223" text-anchor="middle" font-size="3" fill="#666">谁为结果负责？</text>

  <!-- 连接线 -->
  <line x1="568" y1="135" x2="632" y2="135" stroke="#2b8a3e" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="500" y1="163" x2="500" y2="182" stroke="#2b8a3e" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="700" y1="163" x2="700" y2="182" stroke="#2b8a3e" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="500" y1="210" x2="632" y2="210" stroke="#2b8a3e" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- 说明 -->
  <line x1="440" y1="245" x2="760" y2="245" stroke="#e0e0e0" stroke-width="1"/>
  <text x="600" y="268" text-anchor="middle" font-size="3" fill="#666">真实的：</text>
  <text x="600" y="288" text-anchor="middle" font-size="3" font-weight="bold" fill="#2b8a3e">谁做什么决定</text>

  <!-- ============================================================ -->
  <!-- 底部引言 -->
  <!-- ============================================================ -->

  <line x1="40" y1="350" x2="760" y2="350" stroke="#e0e0e0" stroke-width="1"/>

  <rect x="180" y="365" width="440" height="32" rx="6" fill="#fff5f5" stroke="#c92a2a" stroke-width="2"/>
  <text x="400" y="385" text-anchor="middle" font-size="3" fill="#333">组织结构不是组织图，而是</text>
  <text x="400" y="400" text-anchor="middle" font-size="4" font-weight="bold" fill="#c92a2a">决策权分配体系 —— 德鲁克</text>

</svg>