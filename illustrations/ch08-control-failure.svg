<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" style="font-family: 'Songti SC', serif; background: #fefefe;">
  <title>控制逻辑的失效</title>

  <rect width="800" height="420" fill="white"/>

  <!-- 标题 -->
  <text x="400" y="35" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">控制逻辑的失效</text>

  <!-- ============================================================ -->
  <!-- 左侧：工业时代 - 可控输入 -->
  <!-- ============================================================ -->

  <text x="150" y="65" text-anchor="middle" font-size="13" font-weight="bold" fill="#666">工业时代逻辑</text>
  <text x="150" y="82" text-anchor="middle" font-size="10" fill="#999">可控输入 → 可预测输出</text>

  <!-- 工厂流水线示意 -->
  <rect x="50" y="95" width="200" height="230" rx="8" fill="#f8f9fa" stroke="#868e96" stroke-width="2"/>

  <!-- 输入 -->
  <rect x="70" y="125" width="160" height="45" rx="6" fill="#e7f5ff" stroke="#1864ab" stroke-width="2"/>
  <text x="150" y="143" text-anchor="middle" font-size="11" font-weight="bold" fill="#1864ab">输入</text>
  <text x="150" y="158" text-anchor="middle" font-size="10" fill="#666">原材料 | 规格标准</text>

  <!-- 箭头 -->
  <path d="M150 165 L150 195" fill="none" stroke="#868e96" stroke-width="2"/>
  <polygon points="150,200 145,190 155,190" fill="#868e96"/>

  <!-- 过程 (齿轮) -->
  <circle cx="150" cy="220" r="28" fill="#fff" stroke="#666" stroke-width="2"/>
  <circle cx="150" cy="220" r="14" fill="none" stroke="#666" stroke-width="1.5"/>
  
  <!-- 箭头 -->
  <path d="M150 160 L150 185" fill="none" stroke="#868e96" stroke-width="2"/>
  <polygon points="150,192 145,182 155,182" fill="#868e96"/>



  <!-- 箭头 -->
  <path d="M150 245 L150 280" fill="none" stroke="#868e96" stroke-width="2"/>
  <polygon points="150,292 145,282 155,282" fill="#868e96"/>

  <!-- 输出 -->
  <rect x="70" y="300" width="160" height="45" rx="6" fill="#ebfbee" stroke="#2b8a3e" stroke-width="2"/>
  <text x="150" y="318" text-anchor="middle" font-size="11" font-weight="bold" fill="#2b8a3e">输出</text>
  <text x="150" y="333" text-anchor="middle" font-size="10" fill="#666">可预测的质量</text>

  <!-- ============================================================ -->
  <!-- 中间：失效标记 -->
  <!-- ============================================================ -->

  <text x="400" y="195" text-anchor="middle" font-size="50" fill="#c92a2a" opacity="0.7">VS</text>

  <!-- ============================================================ -->
  <!-- 右侧：AI时代 - 不可控输入 -->
  <!-- ============================================================ -->

  <text x="650" y="65" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b8a3e">AI时代逻辑</text>
  <text x="650" y="82" text-anchor="middle" font-size="10" fill="#999">输入不可控 → 输出不可预测</text>

  <!-- 混乱输入 -->
  <rect x="530" y="95" width="240" height="230" rx="8" fill="#fff5f5" stroke="#c92a2a" stroke-width="2"/>

  <!-- 多个数据源 -->
  <rect x="550" y="115" width="75" height="38" rx="4" fill="#e7f5ff" stroke="#1864ab" stroke-width="1.5"/>
  <text x="587" y="138" text-anchor="middle" font-size="10" fill="#1864ab">数据源1</text>

  <rect x="640" y="115" width="75" height="38" rx="4" fill="#f3f0ff" stroke="#862e9c" stroke-width="1.5"/>
  <text x="677" y="138" text-anchor="middle" font-size="10" fill="#862e9c">数据源2</text>

  <rect x="550" y="165" width="75" height="38" rx="4" fill="#fff9db" stroke="#d77a00" stroke-width="1.5"/>
  <text x="587" y="188" text-anchor="middle" font-size="10" fill="#d77a00">数据源3</text>

  <rect x="640" y="165" width="75" height="38" rx="4" fill="#fff5f7" stroke="#e64980" stroke-width="1.5"/>
  <text x="677" y="188" text-anchor="middle" font-size="10" fill="#e64980">数据源4</text>

  <!-- 数据源到AI的箭头 -->
  <path d="M587 203 L620 247" fill="none" stroke="#868e96" stroke-width="1.5" stroke-dasharray="4,3"/>
  <path d="M677 203 L680 247" fill="none" stroke="#868e96" stroke-width="1.5" stroke-dasharray="4,3"/>
  <path d="M587 203 L620 247" fill="none" stroke="#868e96" stroke-width="1.5" stroke-dasharray="4,3"/>
  <path d="M677 203 L680 247" fill="none" stroke="#868e96" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- AI 盒子 -->
  <ellipse cx="650" cy="275" rx="55" ry="28" fill="#f3f0ff" stroke="#862e9c" stroke-width="2"/>
  <text x="650" y="280" text-anchor="middle" font-size="11" font-weight="bold" fill="#862e9c">AI</text>

  <!-- 问号输出 -->
  <rect x="575" y="310" width="150" height="40" rx="6" fill="#fff" stroke="#c92a2a" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="650" y="335" text-anchor="middle" font-size="11" font-weight="bold" fill="#c92a2a">???</text>

  <!-- ============================================================ -->
  <!-- 底部引言 -->
  <!-- ============================================================ -->

  <line x1="50" y1="365" x2="750" y2="365" stroke="#e0e0e0" stroke-width="1"/>

  <rect x="200" y="375" width="400" height="40" rx="6" fill="#fff9db" stroke="#d77a00" stroke-width="2"/>
  <text x="400" y="395" text-anchor="middle" font-size="10" font-weight="bold" fill="#d77a00">道可道，非常道</text>
  <text x="400" y="410" text-anchor="middle" font-size="10" fill="#666">控制得了格式，控制不了语义</text>

</svg>