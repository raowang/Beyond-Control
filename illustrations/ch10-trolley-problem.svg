<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" style="font-family: 'Songti SC', serif; background: #fefefe;">
  <title>扳道岔悖论</title>

  <rect width="800" height="500" fill="white"/>

  <!-- 标题 -->
  <text x="400" y="40" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">扳道岔悖论</text>
  <text x="400" y="62" text-anchor="middle" font-size="10" fill="#777">自动驾驶汽车面临的伦理困境</text>

  <!-- ============================================================ -->
  <!-- 主轨道 -->
  <!-- ============================================================ -->

  <!-- 轨道 - 从上方下来的主轨道 -->
  <path d="M400 80 L400 180" fill="none" stroke="#555" stroke-width="8"/>
  <path d="M400 80 L400 180" fill="none" stroke="#888" stroke-width="4"/>

  <!-- 分岔点 -->
  <circle cx="400" cy="180" r="8" fill="#555"/>

  <!-- 左轨道（向下偏左） -->
  <path d="M400 180 Q350 250 280 320 L180 420" fill="none" stroke="#555" stroke-width="8"/>
  <path d="M400 180 Q350 250 280 320 L180 420" fill="none" stroke="#888" stroke-width="4"/>

  <!-- 右轨道（向下偏右） -->
  <path d="M400 180 Q450 250 520 320 L620 420" fill="none" stroke="#555" stroke-width="8"/>
  <path d="M400 180 Q450 250 520 320 L620 420" fill="none" stroke="#888" stroke-width="4"/>

  <!-- 轨道枕木 -->
  <g stroke="#aaa" stroke-width="2">
    <!-- 主轨道枕木 -->
    <line x1="380" y1="100" x2="420" y2="100"/>
    <line x1="380" y1="120" x2="420" y2="120"/>
    <line x1="380" y1="140" x2="420" y2="140"/>
    <line x1="380" y1="160" x2="420" y2="160"/>
    <!-- 分岔处枕木 -->
    <line x1="385" y1="190" x2="415" y2="170"/>
    <line x1="370" y1="210" x2="430" y2="190"/>
    <!-- 左轨道枕木 -->
    <line x1="340" y1="240" x2="380" y2="230"/>
    <line x1="300" y1="280" x2="340" y2="270"/>
    <line x1="260" y1="320" x2="300" y2="310"/>
    <line x1="220" y1="360" x2="260" y2="350"/>
    <!-- 右轨道枕木 -->
    <line x1="420" y1="240" x2="460" y2="230"/>
    <line x1="460" y1="280" x2="500" y2="270"/>
    <line x1="500" y1="320" x2="540" y2="310"/>
    <line x1="540" y1="360" x2="580" y2="350"/>
  </g>

  <!-- ============================================================ -->
  <!-- 火车头 -->
  <!-- ============================================================ -->

  <g transform="translate(400, 95)">
    <!-- 车头 -->
    <ellipse cx="0" cy="0" rx="25" ry="15" fill="#1864ab"/>
    <!-- 窗户 -->
    <ellipse cx="0" cy="-3" rx="12" ry="6" fill="#e7f5ff"/>
    <!-- 轮子 -->
    <circle cx="-15" cy="12" r="6" fill="#333"/>
    <circle cx="0" cy="12" r="6" fill="#333"/>
    <circle cx="15" cy="12" r="6" fill="#333"/>
  </g>

  <!-- ============================================================ -->
  <!-- 五个人（左轨道末端） -->
  <!-- ============================================================ -->

  <g transform="translate(180, 440)">
    <text x="0" y="-55" text-anchor="middle" font-size="12" fill="#1864ab" font-weight="bold">5人</text>

    <!-- 5个小人 -->
    <g fill="#1864ab">
      <!-- 小人1 -->
      <circle cx="-40" cy="-30" r="8"/>
      <line x1="-40" y1="-22" x2="-40" y2="0" stroke="#1864ab" stroke-width="3"/>
      <line x1="-40" y1="-15" x2="-50" y2="-5" stroke="#1864ab" stroke-width="3"/>
      <line x1="-40" y1="-15" x2="-30" y2="-5" stroke="#1864ab" stroke-width="3"/>
      <line x1="-40" y1="0" x2="-48" y2="15" stroke="#1864ab" stroke-width="3"/>
      <line x1="-40" y1="0" x2="-32" y2="15" stroke="#1864ab" stroke-width="3"/>

      <!-- 小人2 -->
      <circle cx="-20" cy="-35" r="8"/>
      <line x1="-20" y1="-27" x2="-20" y2="-5" stroke="#1864ab" stroke-width="3"/>
      <line x1="-20" y1="-20" x2="-30" y2="-10" stroke="#1864ab" stroke-width="3"/>
      <line x1="-20" y1="-20" x2="-10" y2="-10" stroke="#1864ab" stroke-width="3"/>
      <line x1="-20" y1="-5" x2="-28" y2="10" stroke="#1864ab" stroke-width="3"/>
      <line x1="-20" y1="-5" x2="-12" y2="10" stroke="#1864ab" stroke-width="3"/>

      <!-- 小人3 -->
      <circle cx="0" cy="-30" r="8"/>
      <line x1="0" y1="-22" x2="0" y2="0" stroke="#1864ab" stroke-width="3"/>
      <line x1="0" y1="-15" x2="-10" y2="-5" stroke="#1864ab" stroke-width="3"/>
      <line x1="0" y1="-15" x2="10" y2="-5" stroke="#1864ab" stroke-width="3"/>
      <line x1="0" y1="0" x2="-8" y2="15" stroke="#1864ab" stroke-width="3"/>
      <line x1="0" y1="0" x2="8" y2="15" stroke="#1864ab" stroke-width="3"/>

      <!-- 小人4 -->
      <circle cx="20" cy="-35" r="8"/>
      <line x1="20" y1="-27" x2="20" y2="-5" stroke="#1864ab" stroke-width="3"/>
      <line x1="20" y1="-20" x2="10" y2="-10" stroke="#1864ab" stroke-width="3"/>
      <line x1="20" y1="-20" x2="30" y2="-10" stroke="#1864ab" stroke-width="3"/>
      <line x1="20" y1="-5" x2="12" y2="10" stroke="#1864ab" stroke-width="3"/>
      <line x1="20" y1="-5" x2="28" y2="10" stroke="#1864ab" stroke-width="3"/>

      <!-- 小人5 -->
      <circle cx="40" cy="-30" r="8"/>
      <line x1="40" y1="-22" x2="40" y2="0" stroke="#1864ab" stroke-width="3"/>
      <line x1="40" y1="-15" x2="30" y2="-5" stroke="#1864ab" stroke-width="3"/>
      <line x1="40" y1="-15" x2="50" y2="-5" stroke="#1864ab" stroke-width="3"/>
      <line x1="40" y1="0" x2="32" y2="15" stroke="#1864ab" stroke-width="3"/>
      <line x1="40" y1="0" x2="48" y2="15" stroke="#1864ab" stroke-width="3"/>
    </g>
  </g>

  <!-- ============================================================ -->
  <!-- 一个人（右轨道末端） -->
  <!-- ============================================================ -->

  <g transform="translate(620, 440)">
    <text x="0" y="-55" text-anchor="middle" font-size="12" fill="#e64980" font-weight="bold">1人</text>

    <!-- 1个小人 -->
    <g fill="#e64980">
      <circle cx="0" cy="-30" r="8"/>
      <line x1="0" y1="-22" x2="0" y2="0" stroke="#e64980" stroke-width="3"/>
      <line x1="0" y1="-15" x2="-10" y2="-5" stroke="#e64980" stroke-width="3"/>
      <line x1="0" y1="-15" x2="10" y2="-5" stroke="#e64980" stroke-width="3"/>
      <line x1="0" y1="0" x2="-8" y2="15" stroke="#e64980" stroke-width="3"/>
      <line x1="0" y1="0" x2="8" y2="15" stroke="#e64980" stroke-width="3"/>
    </g>
  </g>

  <!-- ============================================================ -->
  <!-- 扳道岔杠杆 -->
  <!-- ============================================================ -->

  <g transform="translate(320, 200)">
    <!-- 杠杆底座 -->
    <rect x="-5" y="0" width="10" height="20" fill="#555" rx="2"/>
    <!-- 杠杆臂 -->
    <line x1="0" y1="5" x2="30" y2="-30" stroke="#d77a00" stroke-width="4" stroke-linecap="round"/>
    <!-- 把手 -->
    <circle cx="30" cy="-30" r="8" fill="#d77a00"/>
    <text x="30" y="-27" text-anchor="middle" font-size="10" fill="white" font-weight="bold">柄</text>

    <!-- 标注 -->
    <text x="-25" y="-15" font-size="9" fill="#d77a00">扳道岔</text>
  </g>

  <!-- ============================================================ -->
  <!-- 问题标注 -->
  <!-- ============================================================ -->

  <text x="400" y="490" text-anchor="middle" font-size="11" fill="#555">
    如果你是扳道岔的人，你会怎么做？
  </text>

  <!-- 左右标注 -->
  <text x="180" y="395" text-anchor="middle" font-size="10" fill="#1864ab">救5人 →</text>
  <text x="620" y="395" text-anchor="middle" font-size="10" fill="#e64980">救1人 →</text>

</svg>
