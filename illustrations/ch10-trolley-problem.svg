<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" style="font-family: 'Songti SC', serif; background: #fefefe;">
  <title>扳道岔悖论</title>

  <rect width="800" height="600" fill="white"/>

  <!-- 标题 -->
  <text x="400" y="35" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">电车悖论</text>
  <text x="400" y="55" text-anchor="middle" font-size="10" fill="#777">Trolley Problem - Philippa Foot, 1967</text>

  <!-- ============================================================ -->
  <!-- 轨道 -->
  <!-- ============================================================ -->

  <!-- 主轨道：从上方下来的直道 -->
  <path d="M400 80 L400 250" fill="none" stroke="#333" stroke-width="10"/>
  <path d="M400 80 L400 250" fill="none" stroke="#666" stroke-width="6"/>

  <!-- 分岔点 -->
  <circle cx="400" cy="250" r="10" fill="#333"/>

  <!-- 左轨道（向左下方延伸） -->
  <path d="M400 250 Q350 350 180 420 L100 500" fill="none" stroke="#333" stroke-width="10"/>
  <path d="M400 250 Q350 350 180 420 L100 500" fill="none" stroke="#666" stroke-width="6"/>

  <!-- 右轨道（向右下方延伸） -->
  <path d="M400 250 Q450 350 620 420 L700 500" fill="none" stroke="#333" stroke-width="10"/>
  <path d="M400 250 Q450 350 620 420 L700 500" fill="none" stroke="#666" stroke-width="6"/>

  <!-- 枕木 -->
  <g stroke="#999" stroke-width="2">
    <!-- 主轨道枕木 -->
    <line x1="380" y1="120" x2="420" y2="120"/>
    <line x1="380" y1="150" x2="420" y2="150"/>
    <line x1="380" y1="180" x2="420" y2="180"/>
    <line x1="380" y1="210" x2="420" y2="210"/>
    <!-- 分岔处 -->
    <line x1="380" y1="230" x2="420" y2="230"/>
    <line x1="380" y1="250" x2="420" y2="250"/>
    <!-- 左轨道枕木 -->
    <line x1="350" y1="290" x2="390" y2="310"/>
    <line x1="310" y1="310" x2="350" y2="340"/>
    <line x1="270" y1="350" x2="315" y2="375"/>
    <line x1="210" y1="380" x2="250" y2="405"/>
    <line x1="170" y1="400" x2="195" y2="438"/>
    <!-- 右轨道枕木 -->
    <line x1="430" y1="330" x2="470" y2="310"/>
    <line x1="460" y1="360" x2="500" y2="340"/>
    <line x1="515" y1="390" x2="550" y2="370"/>
    <line x1="580" y1="420" x2="620" y2="400"/>
    <line x1="620" y1="450" x2="670" y2="438"/>
  </g>

  <!-- ============================================================ -->
  <!-- 火车头 -->
  <!-- ============================================================ -->

  <g transform="translate(400, 95)">
    <!-- 车头主体 -->
    <rect x="-35" y="-20" width="70" height="40" rx="8" fill="#2c3e50"/>
    <!-- 车头前部（驾驶室） -->
    <rect x="-30" y="-25" width="50" height="12" rx="3" fill="#34495e"/>
    <!-- 窗户 -->
    <rect x="-20" y="-18" width="15" height="12" rx="2" fill="#85c1e9"/>
    <rect x="5" y="-18" width="15" height="12" rx="2" fill="#85c1e9"/>
    <!-- 车轮 -->
    <circle cx="-25" cy="25" r="10" fill="#1a1a1a"/>
    <circle cx="-25" cy="25" r="4" fill="#666"/>
    <circle cx="0" cy="25" r="10" fill="#1a1a1a"/>
    <circle cx="0" cy="25" r="4" fill="#666"/>
    <circle cx="25" cy="25" r="10" fill="#1a1a1a"/>
    <circle cx="25" cy="25" r="4" fill="#666"/>
    <!-- 连接杆 -->
    <line x1="-25" y1="25" x2="25" y2="25" stroke="#666" stroke-width="3"/>
  </g>

  <!-- ============================================================ -->
  <!-- 5个人（左轨道上方） -->
  <!-- ============================================================ -->

  <g transform="translate(155, 435)">
    <text x="0" y="-55" text-anchor="middle" font-size="14" fill="#e74c3c" font-weight="bold">5人</text>

    <!-- 小人1 - 最左 -->
    <g stroke="#333" stroke-width="2.5" fill="none">
      <circle cx="-45" cy="-25" r="8" fill="#e74c3c"/>
      <line x1="-45" y1="-17" x2="-45" y2="3"/>
      <line x1="-45" y1="-10" x2="-55" y2="3"/>
      <line x1="-45" y1="-10" x2="-35" y2="3"/>
      <line x1="-45" y1="3" x2="-52" y2="18"/>
      <line x1="-45" y1="3" x2="-38" y2="18"/>
    </g>

    <!-- 小人2 -->
    <g stroke="#333" stroke-width="2.5" fill="none">
      <circle cx="-22" cy="-28" r="8" fill="#e74c3c"/>
      <line x1="-22" y1="-20" x2="-22" y2="0"/>
      <line x1="-22" y1="-13" x2="-32" y2="0"/>
      <line x1="-22" y1="-13" x2="-12" y2="0"/>
      <line x1="-22" y1="0" x2="-29" y2="15"/>
      <line x1="-22" y1="0" x2="-15" y2="15"/>
    </g>

    <!-- 小人3 -->
    <g stroke="#333" stroke-width="2.5" fill="none">
      <circle cx="0" cy="-25" r="8" fill="#e74c3c"/>
      <line x1="0" y1="-17" x2="0" y2="3"/>
      <line x1="0" y1="-10" x2="-10" y2="3"/>
      <line x1="0" y1="-10" x2="10" y2="3"/>
      <line x1="0" y1="3" x2="-7" y2="18"/>
      <line x1="0" y1="3" x2="7" y2="18"/>
    </g>

    <!-- 小人4 -->
    <g stroke="#333" stroke-width="2.5" fill="none">
      <circle cx="22" cy="-28" r="8" fill="#e74c3c"/>
      <line x1="22" y1="-20" x2="22" y2="0"/>
      <line x1="22" y1="-13" x2="12" y2="0"/>
      <line x1="22" y1="-13" x2="32" y2="0"/>
      <line x1="22" y1="0" x2="15" y2="15"/>
      <line x1="22" y1="0" x2="29" y2="15"/>
    </g>

    <!-- 小人5 -->
    <g stroke="#333" stroke-width="2.5" fill="none">
      <circle cx="45" cy="-25" r="8" fill="#e74c3c"/>
      <line x1="45" y1="-17" x2="45" y2="3"/>
      <line x1="45" y1="-10" x2="35" y2="3"/>
      <line x1="45" y1="-10" x2="55" y2="3"/>
      <line x1="45" y1="3" x2="38" y2="18"/>
      <line x1="45" y1="3" x2="52" y2="18"/>
    </g>
  </g>

  <!-- ============================================================ -->
  <!-- 1个人（右轨道上方） -->
  <!-- ============================================================ -->

  <g transform="translate(645, 435)">
    <text x="0" y="-55" text-anchor="middle" font-size="14" fill="#3498db" font-weight="bold">1人</text>

    <g stroke="#333" stroke-width="2.5" fill="none">
      <circle cx="0" cy="-25" r="8" fill="#3498db"/>
      <line x1="0" y1="-17" x2="0" y2="3"/>
      <line x1="0" y1="-10" x2="-10" y2="3"/>
      <line x1="0" y1="-10" x2="10" y2="3"/>
      <line x1="0" y1="3" x2="-7" y2="18"/>
      <line x1="0" y1="3" x2="7" y2="18"/>
    </g>
  </g>

  <!-- ============================================================ -->
  <!-- 扳道岔杠杆 -->
  <!-- ============================================================ -->

  <g transform="translate(340, 280)">
    <!-- 底座 -->
    <rect x="-8" y="0" width="16" height="25" fill="#555" rx="3"/>
    <!-- 杠杆臂（斜向右上） -->
    <line x1="0" y1="10" x2="60" y2="-40" stroke="#e67e22" stroke-width="6" stroke-linecap="round"/>
    <!-- 把手球 -->
    <circle cx="60" cy="-40" r="12" fill="#e67e22"/>
    <circle cx="60" cy="-40" r="6" fill="#f39c12"/>
  </g>

  <!-- ============================================================ -->
  <!-- 问题标注 -->
  <!-- ============================================================ -->

  <text x="400" y="560" text-anchor="middle" font-size="12" fill="#555" font-weight="bold">
    如果你是扳道岔的人，你会怎么做？
  </text>

  <!-- 左右标注 -->
  <text x="155" y="415" text-anchor="middle" font-size="11" fill="#e74c3c">← 5人</text>
  <text x="645" y="415" text-anchor="middle" font-size="11" fill="#3498db">1人 →</text>

</svg>
