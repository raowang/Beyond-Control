<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" style="font-family: 'Noto Serif CJK SC', serif; background: #fefefe;">
  <title>判断力的四个要素</title>

  <rect width="800" height="420" fill="white"/>

  <!-- 标题 -->
  <text x="400" y="40" text-anchor="middle" font-size="20" font-weight="bold" fill="#333">判断力：人类最后的护城河</text>
  <text x="400" y="62" text-anchor="middle" font-size="12" fill="#777">在不确定性中，决定什么最重要、以及什么行动方向最可能达到目标</text>

  <!-- ============================================================ -->
  <!-- 四个核心要素 -->
  <!-- ============================================================ -->

  <!-- 要素1：情境感知 -->
  <circle cx="180" cy="170" r="80" fill="#e7f5ff" stroke="#1864ab" stroke-width="2"/>
  <text x="180" y="155" text-anchor="middle" font-size="15" font-weight="bold" fill="#1864ab">情境感知</text>
  <text x="180" y="180" text-anchor="middle" font-size="11" fill="#333">理解当前情况的</text>
  <text x="180" y="198" text-anchor="middle" font-size="11" fill="#333">特点和约束</text>

  <!-- 要素2：价值判断 -->
  <circle cx="380" cy="170" r="80" fill="#f3f0ff" stroke="#862e9c" stroke-width="2"/>
  <text x="380" y="155" text-anchor="middle" font-size="15" font-weight="bold" fill="#862e9c">价值判断</text>
  <text x="380" y="180" text-anchor="middle" font-size="11" fill="#333">在多个可能目标中</text>
  <text x="380" y="198" text-anchor="middle" font-size="11" fill="#333">做出取舍</text>

  <!-- 要素3：因果推理 -->
  <circle cx="580" cy="170" r="80" fill="#fff9db" stroke="#d77a00" stroke-width="2"/>
  <text x="580" y="155" text-anchor="middle" font-size="15" font-weight="bold" fill="#d77a00">因果推理</text>
  <text x="580" y="180" text-anchor="middle" font-size="11" fill="#333">理解行动和结果</text>
  <text x="580" y="198" text-anchor="middle" font-size="11" fill="#333">之间的关系</text>

  <!-- 要素4：不确定性处理 -->
  <circle cx="400" cy="300" r="80" fill="#fff5f7" stroke="#e64980" stroke-width="2"/>
  <text x="400" y="285" text-anchor="middle" font-size="15" font-weight="bold" fill="#e64980">不确定性处理</text>
  <text x="400" y="310" text-anchor="middle" font-size="11" fill="#333">在信息不完整时</text>
  <text x="400" y="328" text-anchor="middle" font-size="11" fill="#333">做出决定</text>

  <!-- 连接线 -->
  <path d="M260 170 L300 170" fill="none" stroke="#868e96" stroke-width="1.5" stroke-dasharray="4,3"/>
  <path d="M460 170 L500 170" fill="none" stroke="#868e96" stroke-width="1.5" stroke-dasharray="4,3"/>
  <path d="M400 250 L400 220" fill="none" stroke="#868e96" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- ============================================================ -->
  <!-- 底部：AI vs 人类 -->
  <!-- ============================================================ -->

  <line x1="50" y1="400" x2="750" y2="400" stroke="#e0e0e0" stroke-width="1"/>

  <rect x="100" y="85" width="280" height="45" rx="8" fill="#e7f5ff" stroke="#1864ab" stroke-width="2"/>
  <text x="240" y="108" text-anchor="middle" font-size="13" font-weight="bold" fill="#1864ab">AI 擅长</text>
  <text x="240" y="125" text-anchor="middle" font-size="11" fill="#333">计算、模式识别、大规模分析</text>

  <rect x="420" y="85" width="280" height="45" rx="8" fill="#ebfbee" stroke="#2b8a3e" stroke-width="2"/>
  <text x="560" y="108" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b8a3e">人类 擅长</text>
  <text x="560" y="125" text-anchor="middle" font-size="11" fill="#333">判断力、价值取舍、应对未知</text>

  <text x="400" y="108" text-anchor="middle" font-size="20" fill="#c92a2a">≠</text>

</svg>