<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" style="font-family: 'Songti SC', serif; background: #fefefe;">
  <title>AI只是载体，人才是目的</title>

  <rect width="800" height="420" fill="white"/>

  <!-- 标题 -->
  <text x="400" y="35" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">AI只是载体，人才是目的</text>
  <text x="400" y="55" text-anchor="middle" font-size="10" fill="#777">在AI时代，什么是真正重要的？</text>

  <!-- ============================================================ -->
  <!-- 中央：人类 -->
  <!-- ============================================================ -->

  <circle cx="400" cy="190" r="70" fill="#ebfbee" stroke="#2b8a3e" stroke-width="3"/>
  <text x="400" y="180" text-anchor="middle" font-size="11" font-weight="bold" fill="#2b8a3e">人</text>
  <text x="400" y="205" text-anchor="middle" font-size="15" font-weight="bold" fill="#2b8a3e">目的</text>

  <!-- ============================================================ -->
  <!-- 左侧：AI是什么 -->
  <!-- ============================================================ -->

  <rect x="50" y="85" width="270" height="180" rx="10" fill="#e7f5ff" stroke="#1864ab" stroke-width="2"/>
  <text x="185" y="112" text-anchor="middle" font-size="11" font-weight="bold" fill="#1864ab">AI是什么</text>

  <text x="80" y="145" font-size="10" font-weight="bold" fill="#1864ab">认知升维的载体</text>
  <text x="80" y="168" font-size="10" fill="#333">• 火的发明 → 烹饪</text>
  <text x="80" y="188" font-size="10" fill="#333">• 轮子的发明 → 移动</text>
  <text x="80" y="208" font-size="10" fill="#333">• 计算机 → 信息处理</text>
  <text x="80" y="228" font-size="10" fill="#333">• AI → 认知升维</text>

  <text x="185" y="260" text-anchor="middle" font-size="10" fill="#666">理解语言、学习知识、</text>
  <text x="185" y="275" text-anchor="middle" font-size="10" fill="#666">做出判断、创造内容</text>

  <!-- 连接线 -->
  <path d="M320 190 L330 190" fill="none" stroke="#868e96" stroke-width="2"/>
  <polygon points="330,190 320,185 320,195" fill="#868e96"/>

  <path d="M470 190 L480 190" fill="none" stroke="#868e96" stroke-width="2"/>
  <polygon points="480,190 470,185 470,195" fill="#868e96"/>

  <!-- ============================================================ -->
  <!-- 右侧：为什么人更重要 -->
  <!-- ============================================================ -->

  <rect x="480" y="85" width="270" height="180" rx="10" fill="#fff5f7" stroke="#e64980" stroke-width="2"/>
  <text x="615" y="112" text-anchor="middle" font-size="11" font-weight="bold" fill="#e64980">为什么人更重要</text>

  <text x="510" y="145" font-size="10" font-weight="bold" fill="#e64980">目的由人定</text>
  <text x="510" y="168" font-size="10" fill="#333">• 升维的方向由人定</text>
  <text x="510" y="188" font-size="10" fill="#333">• 思考的目的是人定的</text>
  <text x="510" y="208" font-size="10" fill="#333">• 意义由人赋予</text>

  <text x="510" y="238" font-size="10" fill="#666">工具再强大，</text>
  <text x="510" y="253" font-size="10" fill="#666">也只是工具</text>
  <text x="510" y="268" font-size="10" fill="#666">最终选择权在人</text>

  <!-- ============================================================ -->
  <!-- 底部：核心信息 -->
  <!-- ============================================================ -->

  <line x1="50" y1="310" x2="750" y2="310" stroke="#e0e0e0" stroke-width="1"/>

  <rect x="120" y="325" width="560" height="50" rx="10" fill="#fff9db" stroke="#d77a00" stroke-width="2"/>
  <text x="400" y="352" text-anchor="middle" font-size="11" font-weight="bold" fill="#d77a00">AI来了，你别忘了你是谁</text>
  <text x="400" y="372" text-anchor="middle" font-size="10" fill="#333">技术只是放大镜，放大的，是你选择放大的东西</text>

</svg>