<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" style="font-family: 'Noto Serif CJK SC', serif; background: #fefefe;">
  <title>AI只是载体，人才是目的</title>

  <rect width="800" height="420" fill="white"/>

  <!-- 标题 -->
  <text x="400" y="40" text-anchor="middle" font-size="20" font-weight="bold" fill="#333">AI只是载体，人才是目的</text>
  <text x="400" y="62" text-anchor="middle" font-size="12" fill="#777">在AI时代，什么是真正重要的？</text>

  <!-- ============================================================ -->
  <!-- 中央：人类 -->
  <!-- ============================================================ -->

  <circle cx="400" cy="200" r="80" fill="#ebfbee" stroke="#2b8a3e" stroke-width="3"/>
  <text x="400" y="190" text-anchor="middle" font-size="14" font-weight="bold" fill="#2b8a3e">人</text>
  <text x="400" y="215" text-anchor="middle" font-size="24" font-weight="bold" fill="#2b8a3e">目的</text>

  <!-- ============================================================ -->
  <!-- 左侧：AI是什么 -->
  <!-- ============================================================ -->

  <rect x="50" y="90" width="280" height="200" rx="10" fill="#e7f5ff" stroke="#1864ab" stroke-width="2"/>
  <text x="190" y="120" text-anchor="middle" font-size="15" font-weight="bold" fill="#1864ab">AI是什么</text>

  <text x="80" y="155" font-size="12" font-weight="bold" fill="#1864ab">认知升维的载体</text>
  <text x="80" y="180" font-size="11" fill="#333">• 火的发明 → 烹饪</text>
  <text x="80" y="200" font-size="11" fill="#333">• 轮子的发明 → 移动</text>
  <text x="80" y="220" font-size="11" fill="#333">• 计算机 → 信息处理</text>
  <text x="80" y="240" font-size="11" fill="#333">• AI → 认知升维</text>

  <text x="80" y="275" text-anchor="middle" font-size="11" fill="#666">理解语言、学习知识、</text>
  <text x="80" y="290" text-anchor="middle" font-size="11" fill="#666">做出判断、创造内容</text>

  <!-- ============================================================ -->
  <!-- 右侧：为什么人更重要 -->
  <!-- ============================================================ -->

  <rect x="470" y="90" width="280" height="200" rx="10" fill="#fff5f7" stroke="#e64980" stroke-width="2"/>
  <text x="610" y="120" text-anchor="middle" font-size="15" font-weight="bold" fill="#e64980">为什么人更重要</text>

  <text x="500" y="155" font-size="12" font-weight="bold" fill="#e64980">目的由人定</text>
  <text x="500" y="180" font-size="11" fill="#333">• 升维的方向由人定</text>
  <text x="500" y="200" font-size="11" fill="#333">• 思考的目的是人定的</text>
  <text x="500" y="220" font-size="11" fill="#333">• 意义由人赋予</text>

  <text x="500" y="255" font-size="11" fill="#666">工具再强大，</text>
  <text x="500" y="270" font-size="11" fill="#666">也只是工具</text>
  <text x="500" y="285" font-size="11" fill="#666">最终选择权在人</text>

  <!-- 连接线 -->
  <path d="M330 200 L320 200" fill="none" stroke="#868e96" stroke-width="2"/>
  <polygon points="320,200 330,195 330,205" fill="#868e96"/>

  <path d="M480 200 L470 200" fill="none" stroke="#868e96" stroke-width="2"/>
  <polygon points="480,200 470,195 470,205" fill="#868e96"/>

  <!-- ============================================================ -->
  <!-- 底部：核心信息 -->
  <!-- ============================================================ -->

  <line x1="50" y1="340" x2="750" y2="340" stroke="#e0e0e0" stroke-width="1"/>

  <rect x="150" y="355" width="500" height="55" rx="10" fill="#fff9db" stroke="#d77a00" stroke-width="2"/>
  <text x="400" y="385" text-anchor="middle" font-size="16" font-weight="bold" fill="#d77a00">AI来了，你别忘了你是谁</text>
  <text x="400" y="405" text-anchor="middle" font-size="12" fill="#333">技术只是放大镜，放大的，是你选择放大的东西</text>

</svg>