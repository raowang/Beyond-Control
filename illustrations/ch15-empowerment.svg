<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" style="font-family: 'Noto Serif CJK SC', serif; background: #fefefe;">
  <title>授权下沉一线</title>

  <rect width="800" height="420" fill="white"/>

  <!-- 标题 -->
  <text x="400" y="40" text-anchor="middle" font-size="20" font-weight="bold" fill="#333">授权下沉的四个要素</text>
  <text x="400" y="62" text-anchor="middle" font-size="12" fill="#777">当AI承担规划和标准化工作，一线判断力变得更有价值</text>

  <!-- ============================================================ -->
  <!-- 四个要素 -->
  <!-- ============================================================ -->

  <!-- 要素1：权力 -->
  <rect x="80" y="100" width="160" height="140" rx="10" fill="#e7f5ff" stroke="#1864ab" stroke-width="2"/>
  <circle cx="160" cy="130" r="25" fill="#1864ab"/>
  <text x="160" y="137" text-anchor="middle" font-size="24" font-weight="bold" fill="white">1</text>
  <text x="160" y="175" text-anchor="middle" font-size="16" font-weight="bold" fill="#1864ab">权力</text>
  <text x="160" y="200" text-anchor="middle" font-size="11" fill="#333">决策权</text>
  <text x="160" y="218" text-anchor="middle" font-size="11" fill="#333">交给一线</text>
  <text x="160" y="236" text-anchor="middle" font-size="10" fill="#666">让他们自己做决定</text>

  <!-- 连接箭头 -->
  <path d="M250 170 L290 170" fill="none" stroke="#868e96" stroke-width="2"/>
  <polygon points="290,170 280,165 280,175" fill="#868e96"/>

  <!-- 要素2：能力 -->
  <rect x="300" y="100" width="160" height="140" rx="10" fill="#f3f0ff" stroke="#862e9c" stroke-width="2"/>
  <circle cx="380" cy="130" r="25" fill="#862e9c"/>
  <text x="380" y="137" text-anchor="middle" font-size="24" font-weight="bold" fill="white">2</text>
  <text x="380" y="175" text-anchor="middle" font-size="16" font-weight="bold" fill="#862e9c">能力</text>
  <text x="380" y="200" text-anchor="middle" font-size="11" fill="#333">培训和支持</text>
  <text x="380" y="218" text-anchor="middle" font-size="11" fill="#333">让他们能做决定</text>
  <text x="380" y="236" text-anchor="middle" font-size="10" fill="#666">技能提升</text>

  <!-- 连接箭头 -->
  <path d="M470 170 L510 170" fill="none" stroke="#868e96" stroke-width="2"/>
  <polygon points="510,170 500,165 500,175" fill="#868e96"/>

  <!-- 要素3：信息 -->
  <rect x="520" y="100" width="160" height="140" rx="10" fill="#fff9db" stroke="#d77a00" stroke-width="2"/>
  <circle cx="600" cy="130" r="25" fill="#d77a00"/>
  <text x="600" y="137" text-anchor="middle" font-size="24" font-weight="bold" fill="white">3</text>
  <text x="600" y="175" text-anchor="middle" font-size="16" font-weight="bold" fill="#d77a00">信息</text>
  <text x="600" y="200" text-anchor="middle" font-size="11" fill="#333">实时数据和洞察</text>
  <text x="600" y="218" text-anchor="middle" font-size="11" fill="#333">让决策有依据</text>
  <text x="600" y="236" text-anchor="middle" font-size="10" fill="#666">AI提供全局视角</text>

  <!-- ============================================================ -->
  <!-- 第四要素在底部中央 -->
  <!-- ============================================================ -->

  <!-- 要素4：问责 -->
  <rect x="300" y="270" width="200" height="120" rx="10" fill="#fff5f7" stroke="#e64980" stroke-width="2"/>
  <circle cx="400" cy="300" r="25" fill="#e64980"/>
  <text x="400" y="307" text-anchor="middle" font-size="24" font-weight="bold" fill="white">4</text>
  <text x="400" y="345" text-anchor="middle" font-size="16" font-weight="bold" fill="#e64980">问责</text>
  <text x="400" y="370" text-anchor="middle" font-size="11" fill="#333">对结果负责</text>
  <text x="400" y="388" text-anchor="middle" font-size="10" fill="#666">有权力就要承担后果</text>

  <!-- 连接线 -->
  <path d="M520 230 L450 260" fill="none" stroke="#868e96" stroke-width="1.5" stroke-dasharray="4,3"/>
  <path d="M280 230 L350 260" fill="none" stroke="#868e96" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- ============================================================ -->
  <!-- 底部：核心洞察 -->
  <!-- ============================================================ -->

  <line x1="50" y1="400" x2="750" y2="400" stroke="#e0e0e0" stroke-width="1"/>

  <rect x="150" y="85" width="500" height="45" rx="8" fill="#ebfbee" stroke="#2b8a3e" stroke-width="2"/>
  <text x="400" y="108" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b8a3e">AI时代的新逻辑</text>
  <text x="400" y="125" text-anchor="middle" font-size="11" fill="#333">当AI承担规划、计算、标准化工作 → 一线判断力变得更有价值 → 授权变得必要</text>

</svg>