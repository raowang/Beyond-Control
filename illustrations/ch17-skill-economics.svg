<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" style="font-family: 'Noto Serif CJK SC', serif; background: #fefefe;">
  <title>技能经济学重构</title>

  <rect width="800" height="420" fill="white"/>

  <!-- 标题 -->
  <text x="400" y="40" text-anchor="middle" font-size="20" font-weight="bold" fill="#333">技能经济学重构</text>
  <text x="400" y="62" text-anchor="middle" font-size="12" fill="#777">可编码技能 vs 不可编码技能的价值变迁</text>

  <!-- ============================================================ -->
  <!-- 左侧：可编码技能 -->
  <!-- ============================================================ -->

  <rect x="50" y="90" width="320" height="250" rx="10" fill="#e7f5ff" stroke="#1864ab" stroke-width="2"/>
  <text x="210" y="120" text-anchor="middle" font-size="16" font-weight="bold" fill="#1864ab">可编码技能</text>
  <text x="210" y="142" text-anchor="middle" font-size="11" fill="#666">可被规则化、流程化、标准化</text>

  <!-- 示例 -->
  <text x="80" y="175" font-size="12" fill="#333">• 数据分析</text>
  <text x="80" y="200" font-size="12" fill="#333">• 报告撰写</text>
  <text x="80" y="225" font-size="12" fill="#333">• 基础编程</text>
  <text x="80" y="250" font-size="12" fill="#333">• 标准化客服</text>

  <!-- AI图标 -->
  <ellipse cx="280" cy="280" rx="60" ry="35" fill="#f3f0ff" stroke="#862e9c" stroke-width="2"/>
  <text x="280" y="277" text-anchor="middle" font-size="14" font-weight="bold" fill="#862e9c">AI</text>
  <text x="280" y="295" text-anchor="middle" font-size="10" fill="#666">大规模复制</text>

  <!-- 价值下降箭头 -->
  <path d="M170 280 L120 280" fill="none" stroke="#c92a2a" stroke-width="3"/>
  <polygon points="120,280 135,275 135,285" fill="#c92a2a"/>
  <text x="145" y="270" font-size="10" fill="#c92a2a">价值</text>
  <text x="145" y="282" font-size="10" fill="#c92a2a">下降</text>

  <!-- ============================================================ -->
  <!-- 右侧：不可编码技能 -->
  <!-- ============================================================ -->

  <rect x="430" y="90" width="320" height="250" rx="10" fill="#ebfbee" stroke="#2b8a3e" stroke-width="2"/>
  <text x="590" y="120" text-anchor="middle" font-size="16" font-weight="bold" fill="#2b8a3e">不可编码技能</text>
  <text x="590" y="142" text-anchor="middle" font-size="11" fill="#666">需要判断力、创造力、人际技能</text>

  <!-- 示例 -->
  <text x="460" y="175" font-size="12" fill="#333">• 复杂问题判断</text>
  <text x="460" y="200" font-size="12" fill="#333">• 创新思维</text>
  <text x="460" y="225" font-size="12" fill="#333">• 人际关系建立</text>
  <text x="460" y="250" font-size="12" fill="#333">• 跨领域整合</text>

  <!-- 价值上升箭头 -->
  <path d="M670 280 L720 280" fill="none" stroke="#2b8a3e" stroke-width="3"/>
  <polygon points="720,280 705,275 705,285" fill="#2b8a3e"/>
  <text x="695" y="270" font-size="10" fill="#2b8a3e">价值</text>
  <text x="695" y="282" font-size="10" fill="#2b8a3e">上升</text>

  <!-- ============================================================ -->
  <!-- 中间：价值悖论 -->
  <!-- ============================================================ -->

  <text x="400" y="215" text-anchor="middle" font-size="40" fill="#c92a2a" opacity="0.4">↔</text>

  <!-- ============================================================ -->
  <!-- 底部：核心洞察 -->
  <!-- ============================================================ -->

  <line x1="50" y1="370" x2="750" y2="370" stroke="#e0e0e0" stroke-width="1"/>

  <rect x="100" y="385" width="600" height="35" rx="8" fill="#fff5f5" stroke="#c92a2a" stroke-width="2"/>
  <text x="400" y="408" text-anchor="middle" font-size="13" font-weight="bold" fill="#c92a2a">技能的价值悖论</text>
  <text x="400" y="420" text-anchor="middle" font-size="11" fill="#666">当AI可以完成一项工作时，那项工作对人的价值就降低了</text>

</svg>