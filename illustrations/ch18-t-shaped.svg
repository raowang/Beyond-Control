<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" style="font-family: 'Noto Serif CJK SC', serif; background: #fefefe;">
  <title>T型能力的进化</title>

  <rect width="800" height="420" fill="white"/>

  <!-- 标题 -->
  <text x="400" y="40" text-anchor="middle" font-size="20" font-weight="bold" fill="#333">T型能力的进化</text>
  <text x="400" y="62" text-anchor="middle" font-size="12" fill="#777">从T型到車字型，整合深度成为核心竞争力</text>

  <!-- ============================================================ -->
  <!-- T型人 (左侧) -->
  <!-- ============================================================ -->

  <rect x="50" y="90" width="280" height="200" rx="10" fill="#e7f5ff" stroke="#1864ab" stroke-width="2"/>
  <text x="190" y="120" text-anchor="middle" font-size="16" font-weight="bold" fill="#1864ab">T型人</text>
  <text x="190" y="142" text-anchor="middle" font-size="10" fill="#666">知识经济时代的理想模型</text>

  <!-- T形图 -->
  <!-- 竖线 - 深度 -->
  <rect x="170" y="160" width="40" height="100" rx="4" fill="#1864ab"/>
  <text x="190" y="200" text-anchor="middle" font-size="10" fill="white">深度</text>

  <!-- 横线 - 广度 -->
  <rect x="80" y="160" width="220" height="25" rx="4" fill="#a5d8ff"/>
  <text x="190" y="177" text-anchor="middle" font-size="10" fill="#1864ab">广度</text>

  <text x="190" y="270" text-anchor="middle" font-size="11" fill="#666">某领域专精</text>
  <text x="190" y="285" text-anchor="middle" font-size="11" fill="#666">+ 跨领域了解</text>

  <!-- 贬值箭头 -->
  <path d="M100 240 L60 240" fill="none" stroke="#c92a2a" stroke-width="2"/>
  <polygon points="60,240 75,235 75,245" fill="#c92a2a"/>
  <text x="80" y="230" font-size="9" fill="#c92a2a">贬值</text>

  <!-- ============================================================ -->
  <!-- 中间箭头 -->
  <!-- ============================================================ -->

  <text x="400" y="180" text-anchor="middle" font-size="40" fill="#862e9c">→</text>
  <text x="400" y="210" text-anchor="middle" font-size="12" fill="#862e9c">AI时代</text>

  <!-- ============================================================ -->
  <!-- 車字型人才 (右侧) -->
  <!-- ============================================================ -->

  <rect x="470" y="90" width="280" height="200" rx="10" fill="#ebfbee" stroke="#2b8a3e" stroke-width="2"/>
  <text x="610" y="120" text-anchor="middle" font-size="16" font-weight="bold" fill="#2b8a3e">車字型人才</text>
  <text x="610" y="142" text-anchor="middle" font-size="10" fill="#666">整合深度 = 核心竞争力</text>

  <!-- 車字图示 -->
  <!-- 外框 - 田 -->
  <rect x="530" y="160" width="160" height="80" rx="4" fill="none" stroke="#2b8a3e" stroke-width="2"/>
  <text x="610" y="200" text-anchor="middle" font-size="10" fill="#2b8a3e">核心领域</text>

  <!-- 中间十 - 整合能力 -->
  <line x1="610" y1="160" x2="610" y2="240" stroke="#2b8a3e" stroke-width="3"/>
  <line x1="530" y1="200" x2="690" y2="200" stroke="#2b8a3e" stroke-width="3"/>

  <text x="690" y="200" text-anchor="end" font-size="9" fill="#2b8a3e">整合</text>

  <text x="610" y="270" text-anchor="middle" font-size="11" fill="#666">多领域深度</text>
  <text x="610" y="285" text-anchor="middle" font-size="11" fill="#666">+ 系统性整合</text>

  <!-- 升值箭头 -->
  <path d="M700 240 L740 240" fill="none" stroke="#2b8a3e" stroke-width="2"/>
  <polygon points="740,240 725,235 725,245" fill="#2b8a3e"/>
  <text x="720" y="230" font-size="9" fill="#2b8a3e">升值</text>

  <!-- ============================================================ -->
  <!-- 底部：关键洞察 -->
  <!-- ============================================================ -->

  <line x1="50" y1="320" x2="750" y2="320" stroke="#e0e0e0" stroke-width="1"/>

  <rect x="100" y="335" width="600" height="75" rx="10" fill="#fff5f5" stroke="#e64980" stroke-width="2"/>
  <text x="400" y="360" text-anchor="middle" font-size="14" font-weight="bold" fill="#e64980">为什么？</text>
  <text x="400" y="382" text-anchor="middle" font-size="11" fill="#333">当知识随手可得时，"什么都懂一点"的人在相对贬值</text>
  <text x="400" y="402" text-anchor="middle" font-size="12" fill="#2b8a3e">只有深度，才能判断AI输出的质量，才能在AI基础上做出更好的决策</text>

</svg>