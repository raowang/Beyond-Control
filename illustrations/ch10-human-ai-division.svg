<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" style="font-family: 'Noto Serif CJK SC', serif; background: #fefefe;">
  <title>人机分工决策框架</title>

  <rect width="800" height="450" fill="white"/>

  <!-- 标题 -->
  <text x="400" y="40" text-anchor="middle" font-size="6" font-weight="bold" fill="#333">人机分工决策框架</text>

  <!-- ============================================================ -->
  <!-- 左侧：AI擅长 -->
  <!-- ============================================================ -->

  <rect x="30" y="70" width="340" height="250" rx="10" fill="#e7f5ff" stroke="#1864ab" stroke-width="2"/>
  <text x="200" y="100" text-anchor="middle" font-size="5" font-weight="bold" fill="#1864ab">AI 擅长</text>

  <!-- 模式识别 -->
  <circle cx="60" cy="140" r="8" fill="#1864ab"/>
  <text x="78" y="145" font-size="4" font-weight="bold" fill="#1864ab">模式识别</text>
  <text x="78" y="165" font-size="3" fill="#666">海量数据中找规律</text>

  <!-- 速度与规模 -->
  <circle cx="60" cy="195" r="8" fill="#1864ab"/>
  <text x="78" y="200" font-size="4" font-weight="bold" fill="#1864ab">速度与规模</text>
  <text x="78" y="220" font-size="3" fill="#666">快速处理大量重复决策</text>

  <!-- 一致性 -->
  <circle cx="60" cy="250" r="8" fill="#1864ab"/>
  <text x="78" y="255" font-size="4" font-weight="bold" fill="#1864ab">一致性</text>
  <text x="78" y="275" font-size="3" fill="#666">不受情绪影响</text>

  <!-- 已知标准 -->
  <circle cx="60" cy="305" r="8" fill="#1864ab"/>
  <text x="78" y="310" font-size="4" font-weight="bold" fill="#1864ab">已知标准</text>
  <text x="78" y="330" font-size="3" fill="#666">清晰指标的重复性决策</text>

  <!-- ============================================================ -->
  <!-- 中间VS -->
  <!-- ============================================================ -->

  <circle cx="400" cy="200" r="35" fill="#f5f5f5" stroke="#ddd" stroke-width="2"/>
  <text x="400" y="205" text-anchor="middle" font-size="6" font-weight="bold" fill="#666">VS</text>

  <!-- ============================================================ -->
  <!-- 右侧：人类擅长 -->
  <!-- ============================================================ -->

  <rect x="430" y="70" width="340" height="250" rx="10" fill="#ebfbee" stroke="#2b8a3e" stroke-width="2"/>
  <text x="600" y="100" text-anchor="middle" font-size="5" font-weight="bold" fill="#2b8a3e">人类 擅长</text>

  <!-- 意义建构 -->
  <circle cx="460" cy="140" r="8" fill="#2b8a3e"/>
  <text x="478" y="145" font-size="4" font-weight="bold" fill="#2b8a3e">意义建构</text>
  <text x="478" y="165" font-size="3" fill="#666">理解上下文和深层意图</text>

  <!-- 问出好问题 -->
  <circle cx="460" cy="195" r="8" fill="#2b8a3e"/>
  <text x="478" y="200" font-size="4" font-weight="bold" fill="#2b8a3e">问出好问题</text>
  <text x="478" y="220" font-size="3" fill="#666">AI没想过的问题</text>

  <!-- 价值判断 -->
  <circle cx="460" cy="250" r="8" fill="#2b8a3e"/>
  <text x="478" y="255" font-size="4" font-weight="bold" fill="#2b8a3e">价值判断</text>
  <text x="478" y="275" font-size="3" fill="#666">不确定性中做决策</text>

  <!-- 判断AI何时靠谱 -->
  <circle cx="460" cy="305" r="8" fill="#2b8a3e"/>
  <text x="478" y="310" font-size="4" font-weight="bold" fill="#2b8a3e">判断AI何时靠谱</text>
  <text x="478" y="330" font-size="3" fill="#666">监督和评估AI</text>

  <!-- ============================================================ -->
  <!-- 底部核心问题 -->
  <!-- ============================================================ -->

  <line x1="30" y1="360" x2="770" y2="360" stroke="#e0e0e0" stroke-width="1"/>

  <rect x="150" y="375" width="500" height="70" rx="10" fill="#fff5f5" stroke="#c92a2a" stroke-width="2"/>
  <text x="400" y="400" text-anchor="middle" font-size="4" font-weight="bold" fill="#c92a2a">核心问题：谁来判断AI何时靠谱？</text>
  <text x="400" y="425" text-anchor="middle" font-size="4" fill="#666">答案：还是人。所以人的判断力变得</text>
  <text x="400" y="443" text-anchor="middle" font-size="4" font-weight="bold" fill="#2b8a3e">更重要，不是更不重要</text>

</svg>