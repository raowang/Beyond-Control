<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" style="font-family: 'Noto Serif CJK SC', serif; background: #fefefe;">
  <title>质量的五个决定点</title>

  <rect width="800" height="450" fill="white"/>

  <!-- 标题 -->
  <text x="400" y="40" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">AI系统质量的五个决定点</text>
  <text x="400" y="62" text-anchor="middle" font-size="10" fill="#777">质量不是检验出来的，是构建出来的</text>

  <!-- ============================================================ -->
  <!-- 五个决定点 -->
  <!-- ============================================================ -->

  <!-- 点1：设计 -->
  <circle cx="120" cy="160" r="55" fill="#e7f5ff" stroke="#1864ab" stroke-width="2"/>
  <text x="120" y="150" text-anchor="middle" font-size="13" font-weight="bold" fill="#1864ab">1. 设计</text>
  <text x="120" y="175" text-anchor="middle" font-size="9" fill="#333">模型选择</text>
  <text x="120" y="192" text-anchor="middle" font-size="9" fill="#333">系统架构</text>

  <!-- 连接线 -->
  <path d="M175 160 L240 160" fill="none" stroke="#868e96" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="240,160 232,156 232,164" fill="#868e96"/>

  <!-- 点2：数据 -->
  <circle cx="300" cy="160" r="55" fill="#f3f0ff" stroke="#862e9c" stroke-width="2"/>
  <text x="300" y="150" text-anchor="middle" font-size="13" font-weight="bold" fill="#862e9c">2. 数据</text>
  <text x="300" y="175" text-anchor="middle" font-size="9" fill="#333">训练数据</text>
  <text x="300" y="192" text-anchor="middle" font-size="9" fill="#333">数据质量</text>

  <!-- 连接线 -->
  <path d="M355 160 L420 160" fill="none" stroke="#868e96" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="420,160 412,156 412,164" fill="#868e96"/>

  <!-- 点3：提示词 -->
  <circle cx="480" cy="160" r="55" fill="#ebfbee" stroke="#2b8a3e" stroke-width="2"/>
  <text x="480" y="150" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b8a3e">3. 提示词</text>
  <text x="480" y="175" text-anchor="middle" font-size="9" fill="#333">指令设计</text>
  <text x="480" y="192" text-anchor="middle" font-size="9" fill="#333">上下文构建</text>

  <!-- 连接线 -->
  <path d="M535 160 L600 160" fill="none" stroke="#868e96" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="600,160 592,156 592,164" fill="#868e96"/>

  <!-- 点4：执行 -->
  <circle cx="660" cy="130" r="50" fill="#fff9db" stroke="#d77a00" stroke-width="2"/>
  <text x="660" y="120" text-anchor="middle" font-size="12" font-weight="bold" fill="#d77a00">4. 执行</text>
  <text x="660" y="145" text-anchor="middle" font-size="9" fill="#333">推理监控</text>

  <!-- 连接线 -->
  <path d="M660 180 L660 240" fill="none" stroke="#868e96" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="660,240 656,232 664,232" fill="#868e96"/>

  <!-- 点5：反馈 (底部中央) -->
  <circle cx="400" cy="300" r="60" fill="#fff5f7" stroke="#e64980" stroke-width="3"/>
  <text x="400" y="290" text-anchor="middle" font-size="14" font-weight="bold" fill="#e64980">5. 反馈</text>
  <text x="400" y="315" text-anchor="middle" font-size="10" fill="#333">持续优化闭环</text>

  <!-- 连接4指向5 -->
  <path d="M120 210 Q200 300 340 300" fill="none" stroke="#868e96" stroke-width="1" stroke-dasharray="4,3"/>
  <path d="M300 210 Q320 260 340 300" fill="none" stroke="#868e96" stroke-width="1" stroke-dasharray="4,3"/>
  <path d="M480 210 Q460 260 440 300" fill="none" stroke="#868e96" stroke-width="1" stroke-dasharray="4,3"/>
  <path d="M660 180 L660 240" fill="none" stroke="#868e96" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- ============================================================ -->
  <!-- 底部引言 -->
  <!-- ============================================================ -->

  <line x1="50" y1="400" x2="750" y2="400" stroke="#e0e0e0" stroke-width="1"/>

  <rect x="200" y="420" width="400" height="30" rx="6" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
  <text x="400" y="440" text-anchor="middle" font-size="11">
    <tspan fill="#c92a2a" font-weight="bold">质量不是检验出来的</tspan>
    <tspan fill="#666">，是构建出来的</tspan>
    <tspan fill="#868e96"> —— 戴明</tspan>
  </text>

</svg>