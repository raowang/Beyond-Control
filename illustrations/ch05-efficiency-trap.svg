<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" style="font-family: 'Songti SC', serif; background: #fefefe;">
  <title>效率思维的陷阱</title>

  <rect width="800" height="480" fill="white"/>

  <!-- ============================================================ -->
  <!-- 左侧：效率思维 (把事做对) -->
  <!-- ============================================================ -->

  <text x="130" y="40" text-anchor="middle" font-size="13" font-weight="bold" fill="#1864ab">效率思维</text>
  <text x="130" y="62" text-anchor="middle" font-size="10" fill="#777">把事做对</text>

  <!-- 齿轮图标（简洁机械风格） -->
  <g transform="translate(130, 150)">
    <!-- 齿轮齿 (6个) -->
    <path d="M0 -42 L8 -42 L12 -30 L18 -32 L24 -24 L20 -18 L30 -14 L28 -8 L40 0 L32 8 L36 14 L24 20 L18 14 L12 30 L8 42 L0 42 L-8 42 L-12 30 L-18 32 L-24 24 L-20 18 L-30 14 L-28 8 L-40 0 L-32 -8 L-36 -14 L-24 -20 L-18 -14 L-12 -30 L-8 -42 Z" fill="#1864ab"/>
    <!-- 齿轮内圆 -->
    <circle cx="0" cy="0" r="22" fill="#e7f5ff" stroke="#1864ab" stroke-width="2"/>
    <!-- 中心孔 -->
    <circle cx="0" cy="0" r="8" fill="#1864ab"/>
  </g>

  <!-- 效率公式 -->
  <rect x="50" y="230" width="160" height="50" rx="6" fill="#e7f5ff" stroke="#1864ab" stroke-width="1.5"/>
  <text x="130" y="252" text-anchor="middle" font-size="10" fill="#1864ab">产出 ÷ 投入 = 效率</text>
  <text x="130" y="270" text-anchor="middle" font-size="10" fill="#666">更快、更多、更便宜</text>

  <!-- 特点 -->
  <line x1="30" y1="310" x2="230" y2="310" stroke="#e0e0e0" stroke-width="1"/>
  <circle cx="45" cy="335" r="5" fill="#1864ab"/>
  <text x="58" y="340" font-size="10" fill="#444">关注过程</text>
  <circle cx="45" cy="365" r="5" fill="#1864ab"/>
  <text x="58" y="370" font-size="10" fill="#444">执行精确</text>
  <circle cx="45" cy="395" r="5" fill="#1864ab"/>
  <text x="58" y="400" font-size="10" fill="#444">复制最佳实践</text>

  <!-- 箭头向右 -->
  <path d="M240 200 L320 200" fill="none" stroke="#868e96" stroke-width="2" stroke-dasharray="6,4"/>
  <polygon points="320,200 310,195 310,205" fill="#868e96"/>

  <!-- ============================================================ -->
  <!-- 中间：陷阱 -->
  <!-- ============================================================ -->

  <!-- 深坑 - 简洁椭圆洞 -->
  <ellipse cx="400" cy="240" rx="85" ry="28" fill="#495057"/>
  <ellipse cx="400" cy="238" rx="75" ry="22" fill="#343a40"/>

  <!-- 地面边缘 -->
  <path d="M300 240 Q350 225 400 230 Q450 225 500 240" fill="none" stroke="#c92a2a" stroke-width="3" stroke-linecap="round"/>

  <!-- 人正在掉入 -->
  <g transform="translate(400, 175)">
    <!-- 头 -->
    <circle cx="0" cy="0" r="14" fill="#e9ecef" stroke="#495057" stroke-width="2"/>
    <!-- 眼睛 (惊讶) -->
    <circle cx="-5" cy="-2" r="3" fill="#495057"/>
    <circle cx="5" cy="-2" r="3" fill="#495057"/>
    <!-- 嘴巴 (O形惊讶) -->
    <ellipse cx="0" cy="6" rx="4" ry="5" fill="#495057"/>
    <!-- 身体 -->
    <line x1="0" y1="14" x2="0" y2="45" stroke="#495057" stroke-width="2.5"/>
    <!-- 张开的手臂 -->
    <line x1="-20" y1="25" x2="20" y2="25" stroke="#495057" stroke-width="2.5" stroke-linecap="round"/>
    <!-- 腿 -->
    <line x1="0" y1="45" x2="-10" y2="60" stroke="#495057" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="0" y1="45" x2="10" y2="60" stroke="#495057" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- 文字标签 -->
  <text x="400" y="290" text-anchor="middle" font-size="14" font-weight="bold" fill="#c92a2a">效率陷阱</text>
  <text x="400" y="308" text-anchor="middle" font-size="10" fill="#c92a2a">做对了事</text>
  <text x="400" y="325" text-anchor="middle" font-size="10" fill="#e03131">但未必做对的事</text>

  <!-- 警告三角 -->
  <g transform="translate(485, 165)">
    <polygon points="0,-25 22,15 -22,15" fill="#ffc107" stroke="#e65100" stroke-width="2"/>
    <text x="0" y="8" text-anchor="middle" font-size="20" font-weight="bold" fill="#e65100">!</text>
  </g>

  <!-- ============================================================ -->
  <!-- 右侧：效果思维 (做对的事) -->
  <!-- ============================================================ -->

  <text x="670" y="40" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b8a3e">效果思维</text>
  <text x="670" y="62" text-anchor="middle" font-size="10" fill="#777">做对的事</text>

  <!-- 靶心图标 -->
  <circle cx="670" cy="150" r="45" fill="#ebfbee" stroke="#2b8a3e" stroke-width="2"/>
  <circle cx="670" cy="150" r="35" fill="#fff" stroke="#2b8a3e" stroke-width="1.5"/>
  <circle cx="670" cy="150" r="25" fill="#fff" stroke="#2b8a3e" stroke-width="1.5"/>
  <circle cx="670" cy="150" r="15" fill="#fff" stroke="#2b8a3e" stroke-width="1.5"/>
  <circle cx="670" cy="150" r="5" fill="#2b8a3e"/>
  <!-- 箭头射中靶心 -->
  <line x1="720" y1="100" x2="675" y2="148" stroke="#c92a2a" stroke-width="2"/>
  <polygon points="670,150 678,145 675,155" fill="#c92a2a"/>

  <!-- 关键问题 -->
  <rect x="560" y="230" width="220" height="70" rx="6" fill="#ebfbee" stroke="#2b8a3e" stroke-width="1.5"/>
  <text x="670" y="255" text-anchor="middle" font-size="11" font-weight="bold" fill="#2b8a3e">关键问题</text>
  <text x="670" y="278" text-anchor="middle" font-size="10" fill="#333">什么是对的"事"？</text>
  <text x="670" y="295" text-anchor="middle" font-size="10" fill="#666">这是AI时代重新定义的核心问题</text>

  <!-- 特点 -->
  <line x1="540" y1="330" x2="800" y2="330" stroke="#e0e0e0" stroke-width="1"/>
  <circle cx="555" cy="355" r="5" fill="#2b8a3e"/>
  <text x="568" y="360" font-size="10" fill="#444">关注价值</text>
  <circle cx="555" cy="385" r="5" fill="#2b8a3e"/>
  <text x="568" y="390" font-size="10" fill="#444">持续重新定义目标</text>
  <circle cx="555" cy="415" r="5" fill="#2b8a3e"/>
  <text x="568" y="420" font-size="10" fill="#444">创造新方案</text>

  <!-- ============================================================ -->
  <!-- 底部：核心洞察 -->
  <!-- ============================================================ -->

  <rect x="100" y="450" width="600" height="28" rx="5" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
  <text x="400" y="469" text-anchor="middle" font-size="11">
    <tspan fill="#1864ab" font-weight="bold">效率：</tspan>
    <tspan fill="#666">把事做对</tspan>
    <tspan dx="20" fill="#c92a2a" font-weight="bold">→</tspan>
    <tspan dx="10" fill="#2b8a3e" font-weight="bold">效果：</tspan>
    <tspan fill="#666">做对的事</tspan>
  </text>

</svg>
