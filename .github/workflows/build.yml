name: Build Book

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install markdown

      - name: Convert Markdown to LaTeX
        run: |
          python3 convert_to_latex.py

      - name: Install LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-xetex texlive-lang-chinese texlive-latex-extra

      - name: Build PDF
        run: |
          cd latex
          xelatex -interaction=nonstopmode book.tex
          xelatex -interaction=nonstopmode book.tex

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: 重塑组织逻辑
          path: latex/book.pdf
