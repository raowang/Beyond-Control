name: Build Book

on:
  push:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install TeX Live
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive texlive-latex-extra texlive-xetex
          pip install cairosvg
          mkdir -p inkscape_bin
          cat > inkscape_bin/inkscape << 'WRAPPER'
#!/bin/bash
python3 -c "
import cairosvg
import sys
import re
args = sys.argv[1:]
input_svg = None
output_pdf = None
for i, arg in enumerate(args):
    if arg.endswith('.svg'):
        input_svg = arg
    elif arg == '-o' and i+1 < len(args):
        output_pdf = args[i+1]
    elif '--export-filename' in arg and i+1 < len(args):
        output_pdf = args[i+1]
    elif arg == '-D':
        pass
if input_svg and output_pdf:
    output_pdf = re.sub(r'_svg-tex\.pdf.*', '.pdf', output_pdf)
    cairosvg.svg2pdf(url=input_svg, write_to=output_pdf)
    print(f'Converted {input_svg} -> {output_pdf}', file=sys.stderr)
"
WRAPPER
          chmod +x inkscape_bin/inkscape
          echo "$(pwd)/inkscape_bin" >> $GITHUB_PATH

      - name: Convert Markdown to LaTeX
        run: |
          mkdir -p latex
          python3 .github/scripts/convert_to_latex.py

      - name: Compile LaTeX
        run: |
          export PATH="/usr/local/bin:/usr/bin:/bin:$PATH"
          mkdir -p build
          xelatex -interaction=nonstopmode -shell-escape -output-directory=./build book.tex
          xelatex -interaction=nonstopmode -output-directory=./build book.tex

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v6
        with:
          name: 重塑组织逻辑
          path: book.pdf

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download PDF artifact
        uses: actions/download-artifact@v6
        with:
          name: 重塑组织逻辑
          path: .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          files: ./book.pdf
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}