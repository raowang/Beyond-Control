<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" style="font-family: 'Noto Serif CJK SC', 'Source Han Serif CN', serif; background: #fefefe;">
  <title>预测型世界观 vs 塑造型世界观</title>

  <!-- 手绘风滤镜 -->
  <defs>
    <filter id="sketch" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="3" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.5" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="roughLine">
      <feTurbulence type="turbulence" baseFrequency="0.03" numOctaves="2" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>

  <!-- 背景色 -->
  <rect width="800" height="480" fill="#fefefe"/>

  <!-- ===== 左侧：预测型 ===== -->
  <!-- 标题 -->
  <text x="200" y="38" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1a1a">预测型世界观</text>
  <text x="200" y="58" text-anchor="middle" font-size="13" fill="#666">未来是可以被分析和预测的</text>

  <!-- 人物看水晶球 -->
  <g transform="translate(80, 90)">
    <!-- 头 -->
    <ellipse cx="60" cy="30" rx="22" ry="26" fill="none" stroke="#1a1a1a" stroke-width="2" filter="url(#roughLine)"/>
    <!-- 眼睛 -->
    <circle cx="52" cy="26" r="3" fill="#1a1a1a"/>
    <circle cx="68" cy="26" r="3" fill="#1a1a1a"/>
    <!-- 眉毛（思考状） -->
    <path d="M47 20 Q52 17 57 20" fill="none" stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M63 20 Q68 17 73 20" fill="none" stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round"/>
    <!-- 身体 -->
    <path d="M60 56 Q40 75 35 110" fill="none" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>
    <path d="M60 56 Q80 75 85 110" fill="none" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>
    <!-- 手撑下巴思考 -->
    <path d="M35 90 Q20 85 25 75" fill="none" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- 水晶球 -->
  <g transform="translate(200, 140)">
    <circle cx="0" cy="0" r="40" fill="#e8e8ff" stroke="#1a1a1a" stroke-width="2" filter="url(#roughLine)"/>
    <ellipse cx="-10" cy="-12" rx="12" ry="8" fill="rgba(255,255,255,0.6)" transform="rotate(-30 -10 -12)"/>
    <!-- 球内光芒 -->
    <path d="M-28 -28 L-35 -40 M28 -28 L35 -40 M0 -40 L0 -48" stroke="#aaa" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  </g>

  <!-- 预测箭头：水晶球 -> 未来 -->
  <g transform="translate(280, 120)">
    <!-- 虚线 -->
    <path d="M0 30 Q40 10 80 30 Q120 50 160 30" fill="none" stroke="#888" stroke-width="1.5" stroke-dasharray="6,4" filter="url(#roughLine)"/>
    <!-- 箭头 -->
    <path d="M160 30 L175 30 M168 24 L175 30 L168 36" fill="none" stroke="#888" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="80" y="65" text-anchor="middle" font-size="11" fill="#888">分析 · 调研 · 推算</text>
  </g>

  <!-- 未来盒子 -->
  <g transform="translate(280, 100)">
    <rect x="0" y="0" width="130" height="70" rx="4" fill="#fff8e8" stroke="#1a1a1a" stroke-width="2" filter="url(#roughLine)"/>
    <text x="65" y="28" text-anchor="middle" font-size="12" fill="#1a1a1a" font-weight="bold">✓ 预测的未来</text>
    <text x="65" y="48" text-anchor="middle" font-size="11" fill="#555">"我知道未来会怎样"</text>
    <text x="65" y="62" text-anchor="middle" font-size="10" fill="#999">—— 但实际？</text>
  </g>

  <!-- 问号（现实打脸） -->
  <g transform="translate(420, 170)">
    <text font-size="48" fill="#cc3333" opacity="0.8">?</text>
  </g>

  <!-- 实际未来不同 -->
  <g transform="translate(460, 100)">
    <rect x="0" y="0" width="100" height="70" rx="4" fill="#fff0f0" stroke="#cc3333" stroke-width="2" stroke-dasharray="4,3" filter="url(#roughLine)"/>
    <text x="50" y="28" text-anchor="middle" font-size="12" fill="#cc3333" font-weight="bold">✗ 实际未来</text>
    <text x="50" y="48" text-anchor="middle" font-size="11" fill="#cc3333">出乎意料！</text>
    <text x="50" y="62" text-anchor="middle" font-size="10" fill="#999">"没预测到"</text>
  </g>

  <!-- 特点标签 -->
  <g transform="translate(30, 330)">
    <text x="0" y="0" font-size="14" font-weight="bold" fill="#1a1a1a">特点：</text>
    <circle cx="10" cy="20" r="4" fill="#1a1a1a"/>
    <text x="22" y="24" font-size="12" fill="#333">先分析，再行动</text>
    <circle cx="10" cy="42" r="4" fill="#1a1a1a"/>
    <text x="22" y="46" font-size="12" fill="#333">确定性优先</text>
    <circle cx="10" cy="64" r="4" fill="#1a1a1a"/>
    <text x="22" y="68" font-size="12" fill="#333">计划 = 路线图</text>
    <circle cx="10" cy="86" r="4" fill="#1a1a1a"/>
    <text x="22" y="90" font-size="12" fill="#333">失败 = 规划错误</text>
  </g>

  <!-- ===== 中间分隔 ===== -->
  <line x1="395" y1="20" x2="395" y2="460" stroke="#ccc" stroke-width="1" stroke-dasharray="8,6"/>

  <!-- ===== 右侧：塑造型 ===== -->
  <!-- 标题 -->
  <text x="600" y="38" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1a1a">塑造型世界观</text>
  <text x="600" y="58" text-anchor="middle" font-size="13" fill="#666">未来是被创造出来的</text>

  <!-- 循环图：行动 -> 反馈 -> 调整 -> 更好的行动 -->
  <g transform="translate(600, 160)">
    <!-- 外圈循环箭头 -->
    <path d="M-80 0 A80 80 0 1 1 80 0" fill="none" stroke="#2c5aa0" stroke-width="2.5" stroke-linecap="round" filter="url(#roughLine)"/>
    <path d="M80 0 L88 -8 M80 0 L88 8" fill="none" stroke="#2c5aa0" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- 内圈 -->
    <path d="M-60 0 A60 60 0 1 1 60 0" fill="none" stroke="#4a8ad4" stroke-width="1.5" stroke-dasharray="4,4" opacity="0.5"/>

    <!-- 中心：愿景 -->
    <circle cx="0" cy="0" r="28" fill="#e8f2ff" stroke="#2c5aa0" stroke-width="2"/>
    <text x="0" y="-5" text-anchor="middle" font-size="11" fill="#2c5aa0" font-weight="bold">愿景</text>
    <text x="0" y="10" text-anchor="middle" font-size="10" fill="#555">我要创造什么</text>

    <!-- 上：行动 -->
    <g transform="translate(0, -100)">
      <rect x="-36" y="-16" width="72" height="32" rx="6" fill="#2c5aa0" filter="url(#roughLine)"/>
      <text x="0" y="5" text-anchor="middle" font-size="12" fill="white" font-weight="bold">行动</text>
    </g>

    <!-- 右：反馈 -->
    <g transform="translate(100, 0)">
      <rect x="-36" y="-16" width="72" height="32" rx="6" fill="#4a8ad4" filter="url(#roughLine)"/>
      <text x="0" y="5" text-anchor="middle" font-size="12" fill="white" font-weight="bold">反馈</text>
    </g>

    <!-- 下：学习 -->
    <g transform="translate(0, 100)">
      <rect x="-36" y="-16" width="72" height="32" rx="6" fill="#4a8ad4" filter="url(#roughLine)"/>
      <text x="0" y="5" text-anchor="middle" font-size="12" fill="white" font-weight="bold">学习</text>
    </g>

    <!-- 左：调整 -->
    <g transform="translate(-100, 0)">
      <rect x="-36" y="-16" width="72" height="32" rx="6" fill="#2c5aa0" filter="url(#roughLine)"/>
      <text x="0" y="5" text-anchor="middle" font-size="12" fill="white" font-weight="bold">调整</text>
    </g>

    <!-- 标签 -->
    <text x="0" y="-148" text-anchor="middle" font-size="10" fill="#888">快速实验</text>
    <text x="168" y="4" text-anchor="middle" font-size="10" fill="#888">市场信号</text>
    <text x="0" y="148" text-anchor="middle" font-size="10" fill="#888">迭代改进</text>
    <text x="-168" y="4" text-anchor="middle" font-size="10" fill="#888">修正方向</text>
  </g>

  <!-- 特点标签 -->
  <g transform="translate(430, 330)">
    <text x="0" y="0" font-size="14" font-weight="bold" fill="#1a1a1a">特点：</text>
    <circle cx="10" cy="20" r="4" fill="#2c5aa0"/>
    <text x="22" y="24" font-size="12" fill="#333">行动先于确定性</text>
    <circle cx="10" cy="42" r="4" fill="#2c5aa0"/>
    <text x="22" y="46" font-size="12" fill="#333">快速实验，快速失败</text>
    <circle cx="10" cy="64" r="4" fill="#2c5aa0"/>
    <text x="22" y="68" font-size="12" fill="#333">计划 = 假设</text>
    <circle cx="10" cy="86" r="4" fill="#2c5aa0"/>
    <text x="22" y="90" font-size="12" fill="#333">失败 = 学习机会</text>
  </g>

  <!-- 底部总结 -->
  <g transform="translate(400, 440)">
    <rect x="-350" y="-18" width="700" height="36" rx="6" fill="#f5f5f5" stroke="#ccc" stroke-width="1"/>
    <text x="0" y="6" text-anchor="middle" font-size="13" fill="#333">
      <tspan font-weight="bold" fill="#888">预测</tspan>
      <tspan dx="8">：把未来当已知 → 适应它</tspan>
      <tspan dx="30" font-weight="bold" fill="#2c5aa0">塑造</tspan>
      <tspan dx="8">：把未来当创作 → 创造它</tspan>
    </text>
  </g>

</svg>
