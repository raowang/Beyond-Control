<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" style="font-family: 'Noto Serif CJK SC', serif; background: #fefefe;">
  <title>预测型世界观 vs 塑造型世界观</title>

  <!-- 背景 -->
  <rect width="800" height="440" fill="white"/>

  <!-- ============================================================ -->
  <!-- 左侧：预测型世界观 -->
  <!-- ============================================================ -->

  <!-- 标题 -->
  <text x="195" y="38" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a1a">预测型世界观</text>
  <text x="195" y="58" text-anchor="middle" font-size="12" fill="#777">未来是可以被分析和预测的</text>

  <!-- 水晶球 + 人物（居中在左侧） -->
  <!-- 水晶球 -->
  <circle cx="195" cy="165" r="36" fill="#e8e8ff" stroke="#333" stroke-width="1.8"/>
  <!-- 高光 -->
  <ellipse cx="182" cy="150" rx="11" ry="7" fill="white" opacity="0.7"/>
  <!-- 光芒线 -->
  <line x1="168" y1="132" x2="162" y2="124" stroke="#aaa" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="222" y1="132" x2="228" y2="124" stroke="#aaa" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="195" y1="122" x2="195" y2="114" stroke="#aaa" stroke-width="1.5" stroke-linecap="round"/>

  <!-- 人物剪影（简化小人） -->
  <ellipse cx="118" cy="148" rx="17" ry="20" fill="none" stroke="#333" stroke-width="1.8"/>
  <!-- 眼睛 -->
  <circle cx="113" cy="144" r="2.5" fill="#333"/>
  <circle cx="123" cy="144" r="2.5" fill="#333"/>
  <!-- 身体 -->
  <line x1="118" y1="168" x2="108" y2="205" stroke="#333" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="118" y1="168" x2="128" y2="205" stroke="#333" stroke-width="1.8" stroke-linecap="round"/>
  <!-- 手（摸下巴思考） -->
  <path d="M128 178 Q138 168 132 158" fill="none" stroke="#333" stroke-width="1.8" stroke-linecap="round"/>

  <!-- 虚线箭头：水球 -> 预测盒子 -->
  <line x1="235" y1="165" x2="272" y2="165" stroke="#999" stroke-width="1.5" stroke-dasharray="5,4"/>
  <polygon points="280,165 272,161 272,169" fill="#999"/>

  <!-- 预测的未来盒子 -->
  <rect x="285" y="130" width="110" height="70" rx="4" fill="#fff8e0" stroke="#333" stroke-width="1.5"/>
  <text x="340" y="153" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">预测的未来</text>
  <text x="340" y="172" text-anchor="middle" font-size="10" fill="#666">"我知道会怎样"</text>
  <text x="340" y="188" text-anchor="middle" font-size="9" fill="#999">— 但实际？</text>

  <!-- 问号（预测失误） -->
  <text x="375" y="150" font-size="36" fill="#cc2222" opacity="0.7">?</text>

  <!-- 实际未来盒子（错位，表示失误） -->
  <rect x="285" y="210" width="110" height="55" rx="4" fill="#fff0f0" stroke="#cc2222" stroke-width="1.5" stroke-dasharray="3,3"/>
  <text x="340" y="233" text-anchor="middle" font-size="11" font-weight="bold" fill="#cc2222">实际未来</text>
  <text x="340" y="252" text-anchor="middle" font-size="10" fill="#cc2222">出乎意料！</text>

  <!-- 特点（左侧下方） -->
  <line x1="30" y1="300" x2="360" y2="300" stroke="#e0e0e0" stroke-width="1"/>
  <text x="30" y="322" font-size="13" font-weight="bold" fill="#333">特点</text>
  <circle cx="42" cy="343" r="4" fill="#555"/>
  <text x="52" y="347" font-size="11" fill="#444">先分析，再行动</text>
  <circle cx="42" cy="365" r="4" fill="#555"/>
  <text x="52" y="369" font-size="11" fill="#444">确定性优先</text>
  <circle cx="42" cy="387" r="4" fill="#555"/>
  <text x="52" y="391" font-size="11" fill="#444">计划 = 路线图</text>

  <!-- ============================================================ -->
  <!-- 中间分隔线 -->
  <!-- ============================================================ -->
  <line x1="400" y1="20" x2="400" y2="420" stroke="#ccc" stroke-width="1.5" stroke-dasharray="6,5"/>

  <!-- ============================================================ -->
  <!-- 右侧：塑造型世界观 -->
  <!-- ============================================================ -->

  <!-- 标题 -->
  <text x="600" y="38" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a1a">塑造型世界观</text>
  <text x="600" y="58" text-anchor="middle" font-size="12" fill="#777">未来是被创造出来的</text>

  <!-- 循环图（中心 600, 165） -->
  <!-- 外圈大箭头（顺时针） -->
  <path d="M600 95 A70 70 0 1 1 530 165" fill="none" stroke="#2c5aa0" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M530 165 L523 157 M530 165 L538 157" fill="none" stroke="#2c5aa0" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 上半弧 -->
  <path d="M530 165 A70 70 0 1 1 600 235" fill="none" stroke="#4a8ad4" stroke-width="2.5" stroke-linecap="round"/>
  <!-- 下半弧 -->
  <path d="M600 235 A70 70 0 1 1 670 165" fill="none" stroke="#2c5aa0" stroke-width="2.5" stroke-linecap="round"/>
  <!-- 左半弧 -->
  <path d="M670 165 A70 70 0 1 1 600 95" fill="none" stroke="#4a8ad4" stroke-width="2.5" stroke-linecap="round"/>
  <!-- 箭头（闭合环） -->
  <polygon points="600,91 594,100 606,100" fill="#2c5aa0"/>

  <!-- 中心圆：愿景 -->
  <circle cx="600" cy="165" r="30" fill="#e8f2ff" stroke="#2c5aa0" stroke-width="2"/>
  <text x="600" y="161" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a3a6e">愿景</text>
  <text x="600" y="175" text-anchor="middle" font-size="9" fill="#555">我要创造什么</text>

  <!-- 上：行动 -->
  <rect x="558" y="62" width="84" height="30" rx="6" fill="#2c5aa0"/>
  <text x="600" y="81" text-anchor="middle" font-size="12" font-weight="bold" fill="white">行动</text>

  <!-- 右：反馈 -->
  <rect x="632" y="143" width="84" height="30" rx="6" fill="#4a8ad4"/>
  <text x="674" y="162" text-anchor="middle" font-size="12" font-weight="bold" fill="white">反馈</text>

  <!-- 下：学习 -->
  <rect x="558" y="224" width="84" height="30" rx="6" fill="#4a8ad4"/>
  <text x="600" y="243" text-anchor="middle" font-size="12" font-weight="bold" fill="white">学习</text>

  <!-- 左：调整 -->
  <rect x="484" y="143" width="84" height="30" rx="6" fill="#2c5aa0"/>
  <text x="526" y="162" text-anchor="middle" font-size="12" font-weight="bold" fill="white">调整</text>

  <!-- 节点间小标签 -->
  <text x="640" y="108" text-anchor="middle" font-size="9" fill="#888">快速实验</text>
  <text x="640" y="222" text-anchor="middle" font-size="9" fill="#888">市场信号</text>
  <text x="560" y="222" text-anchor="middle" font-size="9" fill="#888">迭代改进</text>
  <text x="560" y="108" text-anchor="middle" font-size="9" fill="#888">修正方向</text>

  <!-- 特点（右侧下方） -->
  <line x1="440" y1="300" x2="770" y2="300" stroke="#e0e0e0" stroke-width="1"/>
  <text x="440" y="322" font-size="13" font-weight="bold" fill="#333">特点</text>
  <circle cx="452" cy="343" r="4" fill="#2c5aa0"/>
  <text x="462" y="347" font-size="11" fill="#444">行动先于确定性</text>
  <circle cx="452" cy="365" r="4" fill="#2c5aa0"/>
  <text x="462" y="369" font-size="11" fill="#444">快速实验，快速失败</text>
  <circle cx="452" cy="387" r="4" fill="#2c5aa0"/>
  <text x="462" y="391" font-size="11" fill="#444">计划 = 假设</text>

  <!-- ============================================================ -->
  <!-- 底部总结 -->
  <!-- ============================================================ -->
  <rect x="30" y="410" width="740" height="28" rx="5" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
  <text x="400" y="429" text-anchor="middle" font-size="13">
    <tspan fill="#888" font-weight="bold">预测：</tspan>
    <tspan fill="#888">把未来当已知 → 适应它</tspan>
    <tspan dx="24" fill="#2c5aa0" font-weight="bold">塑造：</tspan>
    <tspan fill="#2c5aa0">把未来当创作 → 创造它</tspan>
  </text>

</svg>
